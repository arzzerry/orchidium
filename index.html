  const ho=S.tracker.reduce((a,r)=>a+(+r.hops||0),0);if(ho>0)awardMS('first_hop');

  let anyW1=false,all4W4=true;let enrolled=0;
  COURSES.forEach(c=>{

let toastT;
function showToast(msg,icon='🎉'){const t=document.getElementById('toast');document.getElementById('tmsg').textContent=msg;document.getElementById('tico').textContent=icon;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500);}
let undoFn=null;
function showUndo(msg,fn){
  undoFn=fn;
  const t=document.getElementById('toast');
  document.getElementById('tico').textContent='🗑️';
  document.getElementById('tmsg').innerHTML=escHtml(msg)+' <button class="undo-btn" onclick="doUndo()">Undo</button>';
  t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>{t.classList.remove('show');undoFn=null;},6000);
}
function doUndo(){
  if(undoFn){undoFn();undoFn=null;}
  document.getElementById('toast').classList.remove('show');
  clearTimeout(toastT);
}
function fireConfetti(){const cols=['#4F46E5','#22C55E','#F59E0B','#A855F7','#EF4444','#60A5FA'];for(let i=0;i<60;i++){const el=document.createElement('div');el.className='cp';el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;transform:rotate(${Math.random()*360}deg)`;document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}}

let SEARCH_INDEX=null,LAST_HITS=[];
function buildSearchIndex(){
  if(SEARCH_INDEX)return SEARCH_INDEX;
  const strip=h=>String(h).replace(/<[^>]+>/g,'').replace(/&[a-zA-Z#0-9]+;/g,' ');
  const ix=[];
  COURSES.forEach(c=>c.weeks.forEach((w,wi)=>w.secs.forEach((sec,si)=>(sec.items||[]).forEach((item,ti)=>{
    const id=item.id||tid(c.id,wi,si,ti);
    const label=strip(item.text||'');
    let hay=label;
    if(SD[id])hay+=' '+SD[id].map(strip).join(' ');
    ix.push({type:'task',meta:c.icon+' '+c.label+' · '+w.label,label,hay:hay.toLowerCase(),cid:c.id,wi,id});
  }))));
  [
    ['abtests','🔬','A/B Test Tracker'],['vault','🗄️','Offer Vault'],['weekly','📋','Weekly Review'],['email','📧','Email Sequence Builder'],['export','📄','Progress Export'],['milestones','🏆','Milestones']]
    .forEach(t=>ix.push({type:'view',meta:t[1]+' Tool',label:t[2],hay:t[2].toLowerCase(),view:t[0]}));
  SEARCH_INDEX=ix;
  return ix;
}
function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  const inp=document.getElementById('search-inp');
  inp.value='';
  document.getElementById('search-results').innerHTML='<div class="search-empty">Search every task, step, tool and saved offer.</div>';
  setTimeout(()=>inp.focus(),50);
}
function closeSearch(){document.getElementById('search-overlay').classList.remove('open');}
function doSearch(){
  const q=(document.getElementById('search-inp').value||'').trim().toLowerCase();
  const out=document.getElementById('search-results');
  if(q.length<2){out.innerHTML='<div class="search-empty">Keep typing…</div>';return;}
  const hits=[];
  (S.vault||[]).forEach(o=>{if((o.name||'').toLowerCase().includes(q))hits.push({type:'view',meta:'🗄️ Offer Vault',label:o.name||'',view:'vault'});});
  for(const e of buildSearchIndex()){
    if(e.hay.includes(q)){hits.push(e);if(hits.length>=25)break;}
  }
  LAST_HITS=hits;
  if(!hits.length){out.innerHTML='<div class="search-empty">No results for &quot;'+escHtml(q)+'&quot;</div>';return;}
  out.innerHTML=hits.map((h,i)=>{
    let label=escHtml(h.label);
    if(label.length>110)label=label.slice(0,110)+'…';
    return '<div class="search-item" onclick="searchGo('+i+')"><div class="search-item-meta">'+escHtml(h.meta)+'</div><div class="search-item-text">'+label+'</div></div>';
  }).join('');
}
function searchGo(i){
  const h=LAST_HITS[i];if(!h)return;
  closeSearch();
  if(h.type==='task'){S.expanded[h.id]=true;goCourse(h.cid,h.wi);}
  else{goTool(h.view);}
}

function renderABRow(t,i){
  const wClass={'control':'w-control','variant':'w-variant','inconclusive':'w-inc'}[t.winner]||'w-inc';
  const wLabel={'control':'Control','variant':'Variant','inconclusive':'Unclear'}[t.winner]||'—';
  const improvement=t.winner!=='inconclusive'&&t.controlVal&&t.variantVal?calcImprovement(t):null;
  return`<div>
    <div class="ab-row" onclick="toggleABExpand(${i})">
      <div class="ab-cell">${t.date||'—'}</div>
      <div class="ab-cell"><span class="ab-type-badge">${t.type||'—'}</span></div>
      <div class="ab-cell">${{'fb':'📘 FB','ms':'🪟 MS','ig':'📸 IG','ga':'🔍 GA'}[t.platform]||t.platform||'—'}</div>
      <div class="ab-cell name">${t.control||'—'}</div>
      <div class="ab-cell name">${t.variant||'—'}</div>
      <div class="ab-cell">${t.metric||'—'}${improvement?` <span style="color:var(--green);font-size:10px">(${improvement})</span>`:''}</div>
      <div class="ab-cell"><span class="winner-badge ${wClass}">${wLabel}</span></div>
    </div>
    <div class="ab-expand" id="ab-exp-${i}">
      <div class="ab-expand-grid">
        <div><div class="field-label" style="margin-bottom:4px">Control value</div><div style="font-size:13px;color:var(--text)">${t.controlVal||'—'}</div></div>
        <div><div class="field-label" style="margin-bottom:4px">Variant value</div><div style="font-size:13px;color:var(--text)">${t.variantVal||'—'}</div></div>
        <div><div class="field-label" style="margin-bottom:4px">Notes</div><div style="font-size:13px;color:var(--text2)">${t.notes||'—'}</div></div>
      </div>
      <button onclick="deleteABTest(${i})" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--red);font-size:11px;padding:5px 10px;cursor:pointer;transition:all .15s" onmouseover="this.style.background='var(--rsoft)'" onmouseout="this.style.background='none'">🗑 Delete test</button>
    </div>
  </div>`;
}

function calcImprovement(t){
  const cv=parseFloat(t.controlVal),vv=parseFloat(t.variantVal);
  if(isNaN(cv)||isNaN(vv)||cv===0)return null;
  const diff=((vv-cv)/cv*100).toFixed(0);
  return(diff>0?'+':'')+diff+'%';
}

function renderVaultCard(o,i){
  const score=calcVaultScore(o);
  const scoreColor=score>=4?'var(--green)':score>=3?'var(--amber)':'var(--red)';
  const statusClass={'Evaluating':'vs-evaluating','Testing':'vs-testing','Winner':'vs-winner','Paused':'vs-paused','Eliminated':'vs-eliminated'}[o.status]||'vs-evaluating';
  return`<div class="vault-card" onclick="showVaultForm(${i})">
    <div class="vc-header">
      <div class="vc-name">${o.name||'Untitled Offer'}</div>
      <div class="vc-status ${statusClass}">${o.status||'Evaluating'}</div>
    </div>
    <div class="vc-metrics">
      <div class="vc-metric">Gravity: <span>${o.gravity||'—'}</span></div>
      <div class="vc-metric">Avg$/Conv: <span>${o.avgPay?'$'+o.avgPay:'—'}</span></div>
    </div>
    <div class="vc-score">
      <div style="font-size:10px;color:var(--text3);width:40px">Score</div>
      <div class="vc-score-bar"><div class="vc-score-fill" style="width:${score/5*100}%;background:${scoreColor}"></div></div>
      <div class="vc-score-num">${score}/5</div>
    </div>
    ${o.notes?`<div class="vc-notes">${o.notes}</div>`:''}
    <div class="vc-date">Added ${o.dateAdded||'—'}</div>
  </div>`;
}

function calcVaultScore(o){
  let s=0;
  const g=parseFloat(o.gravity)||0;const p=parseFloat(o.avgPay)||0;
  if(g>=30&&g<=80)s++;else if(g>0)s+=0.5;
  if(p>=35)s++;else if(p>=25)s+=0.5;
  if(parseInt(o.mobileScore)>=4)s++;else if(parseInt(o.mobileScore)===3)s+=0.5;
  if(parseInt(o.pageScore)>=4)s++;else if(parseInt(o.pageScore)===3)s+=0.5;
  if(o.compliant)s++;
  return Math.min(5,Math.round(s*10)/10);
}

function saveVaultOffer(idx){
  const o={
    name:document.getElementById('vo-name')?.value||'',
    status:document.getElementById('vo-status')?.value||'Evaluating',
    gravity:document.getElementById('vo-gravity')?.value||'',
    avgPay:document.getElementById('vo-pay')?.value||'',
    mobileScore:document.getElementById('vo-mobile')?.value||3,
    pageScore:document.getElementById('vo-page')?.value||3,
    hoplink:document.getElementById('vo-hoplink')?.value||'',
    compliant:document.getElementById('vo-compliant')?.checked!==false,
    notes:document.getElementById('vo-notes')?.value||'',
    dateAdded:idx!==null&&idx!==undefined&&S.vault[idx]?.dateAdded?S.vault[idx].dateAdded:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    id:idx!==null&&idx!==undefined&&S.vault[idx]?.id?S.vault[idx].id:Date.now(),
  };
  if(!o.name){showToast('Enter an offer name.','⚠️');return;}

  function delta(c,p,higherBetter=true){
    if(!p)return '<span class="delta-nil">—</span>';
    const pct=((c-p)/p*100).toFixed(0);
    const up=higherBetter?(c>p):(c<p);

function saveReview(curr){
  const c=typeof curr==='string'?JSON.parse(curr.replace(/&quot;/g,'"')):curr;

// ── BACKUP / RESTORE ──────────────────────────────────────────────────────────
function downloadBackup(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='clickbank-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Backup downloaded. Keep it somewhere safe!','💾');
}

function handleRestoreFile(input){
  const file=input.files&&input.files[0];
  input.value='';
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    let data;
    try{data=JSON.parse(reader.result);}catch(e){data=null;}
    if(!data||typeof data!=='object'||typeof data.done!=='object'){
      showToast('That file is not a valid backup.','⚠️');return;
    }
    if(!confirm('Restoring will replace your current data with the backup. Continue?'))return;
    localStorage.setItem('cbv3',JSON.stringify(data));
    location.reload();
  };
  reader.readAsText(file);
}

// ── INTELLIGENCE ──────────────────────────────────────────────────────────────
function calcFunnelHealth(){
  const rows=S.tracker.filter(r=>+r.spend>0);
  if(!rows.length)return null;
  const totalSpend=rows.reduce((a,r)=>a+(+r.spend||0),0);
  const totalClicks=rows.reduce((a,r)=>a+(+r.clicks||0),0);
  const totalHops=rows.reduce((a,r)=>a+(+r.hops||0),0);
  const totalSales=rows.reduce((a,r)=>a+(+r.sales||0),0);
  const totalRev=rows.reduce((a,r)=>a+(+r.rev||0),0);
  const ctrs=rows.filter(r=>r.ctr&&parseFloat(r.ctr)>0).map(r=>parseFloat(r.ctr));
  const avgCTR=ctrs.length?ctrs.reduce((a,b)=>a+b)/ctrs.length:0;
  const hopRate=totalClicks>0?(totalHops/totalClicks)*100:0;
  const convRate=totalHops>0?(totalSales/totalHops)*100:0;
  const roas=totalSpend>0?totalRev/totalSpend:0;
  const ctrScore=avgCTR>=1?25:avgCTR>=0.5?15:avgCTR>0?5:0;
  const hopScore=hopRate>=20?25:hopRate>=10?15:hopRate>0?5:0;
  const convScore=convRate>=2?25:convRate>=0.5?15:convRate>0?5:0;
  const roasScore=roas>=1?25:roas>=0.5?15:roas>0?5:0;
  const score=ctrScore+hopScore+convScore+roasScore;
  let diagnosis,action,status;
  if(totalClicks===0){
    status='broken';diagnosis='No click data yet';action='Start logging your ad data daily to activate the intelligence panel.';
  } else if(avgCTR<0.5){
    status='broken';diagnosis='Ad hook is underperforming';action='Your CTR is below 0.5% — people see the ad but scroll past it. Rewrite your hook and test 3 new variations: pain, curiosity, and social proof.';
  } else if(hopRate<10&&totalClicks>50){
    status='struggling';diagnosis='Bridge page is the bottleneck';action='Good clicks, but only '+hopRate.toFixed(1)+'% click through to the offer. Rewrite your CTA section — make the button more specific and add urgency or social proof above it.';
  } else if(convRate<0.5&&totalHops>20){
    status='struggling';diagnosis='Offer is not converting';action='Your bridge page is working ('+hopRate.toFixed(1)+'% hop rate) but the offer page is not closing the sale. Test an alternative ClickBank offer with a stronger, cleaner sales page.';
  } else if(roas<1&&totalSales>0){
    status='improving';diagnosis='Generating sales, not yet profitable';action='You are converting — now focus on reducing cost per sale. Tighten targeting to your best age bracket, pause underperforming ads, and scale your control ad with a 20% budget increase.';
  } else if(roas>=1){
    status='healthy';diagnosis='Funnel is working — scale it';action='Your funnel is profitable. Duplicate your best Ad Set at 20% higher budget. Keep 2 challenger creatives running at $5/day to protect against creative fatigue.';
  } else {
    status='improving';diagnosis='Building towards first sale';action='Your metrics are moving in the right direction. Keep logging daily — the diagnosis will sharpen as data accumulates.';
  }
  return{score,ctrScore,hopScore,convScore,roasScore,avgCTR,hopRate,convRate,roas,totalSpend,totalClicks,totalHops,totalSales,totalRev,diagnosis,action,status};
}

function calcSpendVelocity(){
  const rows=S.tracker.filter(r=>+r.spend>0);
  if(rows.length<2)return null;
  const totalSpend=rows.reduce((a,r)=>a+(+r.spend||0),0);
  const totalClicks=rows.reduce((a,r)=>a+(+r.clicks||0),0);
  const days=rows.length;
  const dailySpend=totalSpend/days;
  const dailyClicks=totalClicks/days;
  const remaining=Math.max(0,S.budget-S.spent);
  const daysLeft=dailySpend>0?remaining/dailySpend:null;
  const CLICKS_NEEDED=300;
  const clicksLeft=Math.max(0,CLICKS_NEEDED-totalClicks);
  const daysToJudge=dailyClicks>0?clicksLeft/dailyClicks:null;
  let status,message;
  if(totalClicks>=CLICKS_NEEDED){
    status='ok';message='You have enough click data ('+totalClicks+' clicks) to make reliable decisions. Budget runway: '+(daysLeft!=null?Math.round(daysLeft)+' days remaining.':'unlimited.');
  } else if(daysLeft!=null&&daysToJudge!=null&&daysLeft<daysToJudge){
    status='danger';message='At $'+dailySpend.toFixed(0)+'/day your budget runs out in ~'+Math.round(daysLeft)+' days, but you need ~'+Math.round(daysToJudge)+' more days to reach 300 clicks for a reliable decision. Consider reducing daily spend to extend your runway.';
  } else {
    status='ok';message='You have ~'+( daysLeft!=null?Math.round(daysLeft):'many')+' days of budget remaining and need ~'+(daysToJudge!=null?Math.round(daysToJudge):'a few')+' more days to reach 300 clicks. You have enough runway.';
  }
  return{dailySpend,dailyClicks,daysLeft,daysToJudge,totalClicks,remaining,days,status,message};
}

function getBestAd(){
  const rows=S.tracker.filter(r=>r.name&&r.name.trim()&&+r.spend>0);
  if(!rows.length)return null;
  const ads={};
  rows.forEach(r=>{
    const n=r.name.trim();
    if(!ads[n])ads[n]={name:n,spend:0,clicks:0,hops:0,sales:0,rev:0,days:0};
    ads[n].spend+=(+r.spend||0);ads[n].clicks+=(+r.clicks||0);
    ads[n].hops+=(+r.hops||0);ads[n].sales+=(+r.sales||0);
    ads[n].rev+=(+r.rev||0);ads[n].days++;
  });
  const adList=Object.values(ads).filter(a=>a.clicks>0);
  if(!adList.length)return null;
  adList.forEach(a=>{
    a.cpc=a.clicks>0?a.spend/a.clicks:999;
    a.hopRate=a.clicks>0?(a.hops/a.clicks)*100:0;
    a.roas=a.spend>0?a.rev/a.spend:0;
    a.score=(a.hopRate*2)+(a.hops>0?50:0)+(a.roas*20)-(a.cpc*5);
  });
  adList.sort((a,b)=>b.score-a.score);
  const best=adList[0];const worst=adList[adList.length-1];
  const cpcImprovement=worst.cpc>0&&best.cpc<worst.cpc?((worst.cpc-best.cpc)/worst.cpc*100).toFixed(0):null;
  return{best,worst,adList,cpcImprovement};
}

function openIntelligence(){
  const modal=document.getElementById('intel-modal');
  const inner=document.getElementById('intel-modal-inner');
  if(!modal||!inner)return;
  modal.style.display='block';
  inner.innerHTML=renderIntelligence();
}
function closeIntelligence(){
  document.getElementById('intel-modal').style.display='none';
}

function renderIntelligence(){
  const health=calcFunnelHealth();
  const vel=calcSpendVelocity();
  const bestAd=getBestAd();
  const hasData=!!(health&&health.totalClicks>0);
  if(!hasData){
    return`<button class="intel-back" onclick="closeIntelligence()">← Back to Home</button>
    <div class="intel-title" style="display:flex;align-items:center;gap:10px">Campaign Intelligence ${ib('intel')}</div>
    <div class="intel-sub">Your personal campaign analyst — powered by your Ad Tracker data.</div>
    <div class="intel-card full">
      <div class="no-data-state">
        <div class="no-data-icon">📊</div>
        <div class="no-data-title">No campaign data yet</div>
        <div class="no-data-sub">Start logging your daily ad metrics in the Ad Tracker (Week 3 → Ad Tracker tab). Once you have at least 2 days of data, the intelligence panel will activate and show you exactly what to fix.</div>
      </div>
    </div>`;
  }

  // Score ring
  const score=health.score;
  const statusLabel={broken:'Broken',struggling:'Struggling',improving:'Improving',healthy:'Healthy'}[health.status];
  const statusClass={broken:'st-broken',struggling:'st-warn',improving:'st-improving',healthy:'st-healthy'}[health.status];
  const scoreColor={broken:'var(--red)',struggling:'var(--amber)',improving:'#FBBF24',healthy:'var(--green)'}[health.status];
  const circumference=2*Math.PI*34;
  const offset=circumference-(score/100)*circumference;

  // Component scores
  const comps=[
    {label:'Ad hook',score:health.ctrScore,max:25,val:health.avgCTR>0?health.avgCTR.toFixed(1)+'% CTR':'No data'},
    {label:'Bridge pg',score:health.hopScore,max:25,val:health.hopRate>0?health.hopRate.toFixed(1)+'% hops':'No data'},
    {label:'Offer conv',score:health.convScore,max:25,val:health.convRate>0?health.convRate.toFixed(1)+'% conv':'No data'},
    {label:'Profitability',score:health.roasScore,max:25,val:health.roas>0?health.roas.toFixed(2)+'x ROAS':'No data'},
  ];
  const compHtml=comps.map(c=>{
    const pct=(c.score/c.max)*100;
    const col=c.score>=20?'var(--green)':c.score>=10?'var(--amber)':'var(--red)';
    return`<div class="comp-row">
      <div class="comp-label">${c.label}</div>
      <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="comp-pts">${c.score}/${c.max}</div>
    </div>`;
  }).join('');

  // Velocity card
  let velHtml='';
  if(vel){
    const alertClass={ok:'vel-ok',warn:'vel-warn',danger:'vel-danger'}[vel.status];
    const alertIcon={ok:'✅',warn:'⚠️',danger:'🚨'}[vel.status];
    velHtml=`
      <div class="vel-stat-row">
        <div class="vel-stat"><div class="vel-stat-num">$${vel.dailySpend.toFixed(0)}</div><div class="vel-stat-lbl">Avg/day</div></div>
        <div class="vel-stat"><div class="vel-stat-num">${Math.round(vel.dailyClicks)}</div><div class="vel-stat-lbl">Clicks/day</div></div>
        <div class="vel-stat"><div class="vel-stat-num">${vel.totalClicks}</div><div class="vel-stat-lbl">Total clicks</div></div>
        <div class="vel-stat"><div class="vel-stat-num">$${vel.remaining.toFixed(0)}</div><div class="vel-stat-lbl">Remaining</div></div>
      </div>
      <div class="vel-alert ${alertClass}"><span>${alertIcon}</span><span>${vel.message}</span></div>`;
  } else {
    velHtml=`<div style="font-size:13px;color:var(--text3);text-align:center;padding:12px">Log at least 2 days of spend data to see your velocity analysis.</div>`;
  }

  // Best ad card
  let bestAdHtml='';
  if(bestAd){
    const{best,adList,cpcImprovement}=bestAd;
    bestAdHtml=`
      <div class="best-ad-name">🏆 ${best.name}</div>
      <div class="best-ad-stats">
        <div class="bas"><div class="bas-num">$${best.cpc.toFixed(2)}</div><div class="bas-lbl">CPC</div></div>
        <div class="bas"><div class="bas-num">${best.hopRate.toFixed(1)}%</div><div class="bas-lbl">Hop rate</div></div>
        <div class="bas"><div class="bas-num">${best.clicks}</div><div class="bas-lbl">Clicks</div></div>
        <div class="bas"><div class="bas-num">${best.sales}</div><div class="bas-lbl">Sales</div></div>
      </div>
      ${cpcImprovement?`<div class="best-vs">This ad has a <strong>${cpcImprovement}% lower CPC</strong> than your worst performer. This is your control — pause the others and test new variations against this benchmark.</div>`:'<div class="best-vs">This is your top performing ad based on hop rate and cost efficiency. Use it as your control.</div>'}
      ${adList.length>1?`<div class="ad-rank-list">${adList.map((a,i)=>`<div class="ad-rank-row"><div class="ad-rank-pos">${i+1}</div><div class="ad-rank-name">${a.name}</div><div class="ad-rank-cpc">$${a.cpc.toFixed(2)} CPC · ${a.hopRate.toFixed(1)}% hops</div></div>`).join('')}</div>`:''}`;
  } else {
    bestAdHtml=`<div style="font-size:13px;color:var(--text3);text-align:center;padding:12px">Name your ads in the Ad Tracker to see which is performing best.</div>`;
  }

  return`
    <button class="intel-back" onclick="closeIntelligence()">← Back to Home</button>
    <div class="intel-title" style="display:flex;align-items:center;gap:10px">Campaign Intelligence ${ib('intel')}</div>
    <div class="intel-sub">Your personal campaign analyst — live diagnosis powered by your Ad Tracker data.</div>
    <div class="intel-grid">
      <div class="intel-card">
        <div class="intel-card-label">Funnel Health Score</div>
        <div class="score-ring-wrap">
          <div class="score-ring">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle class="score-ring-bg" cx="40" cy="40" r="34"/>
              <circle class="score-ring-fill" cx="40" cy="40" r="34"
                stroke="${scoreColor}"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}"/>
            </svg>
            <div class="score-num" style="color:${scoreColor}">${score}</div>
          </div>
          <div class="score-info">
            <div class="score-label">${health.diagnosis}</div>
            <div class="score-status ${statusClass}">${statusLabel}</div>
          </div>
        </div>
        <div class="comp-scores">${compHtml}</div>
        <div class="diag-box"><div class="diag-label">Recommended action</div><div class="diag-text">${health.action}</div></div>
      </div>
      <div class="intel-card">
        <div class="intel-card-label">💸 Spend Velocity</div>
        ${velHtml}
      </div>
    </div>
    <div class="intel-card full">
      <div class="intel-card-label">🏆 Best Performing Ad</div>
      ${bestAdHtml}
    </div>`;
}
