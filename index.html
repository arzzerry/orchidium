<title>Orchidium v4.0 · Mission Control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME VARIABLES ── */
:root,[data-theme="dark"]{
  --bg:#07090F;--bg2:#0D1117;--card:#111827;--card2:#1A2235;
  --border:#1E2D45;--border2:#253550;
  --blue:#3B82F6;--blue-dim:#1D4ED8;--bglow:rgba(59,130,246,.15);--bsoft:rgba(59,130,246,.08);
  --green:#22C55E;--gsoft:rgba(34,197,94,.1);
  --amber:#F59E0B;--asoft:rgba(245,158,11,.1);
  --red:#EF4444;--rsoft:rgba(239,68,68,.1);
  --purple:#A855F7;--psoft:rgba(168,85,247,.1);
  --text:#E8EFF8;--text2:#8BA0BC;--text3:#4A6080;
  --sbg:#0D1117;--sborder:#1E2D45;--snav-text:#8BA0BC;--snav-active:#E8EFF8;
  --snav-hover:rgba(59,130,246,.1);--snav-activebg:rgba(59,130,246,.15);
  --logo-text:#E8EFF8;--badge-bg:rgba(59,130,246,.15);--badge-color:#60A5FA;
  --btn-grad:linear-gradient(135deg,#3B82F6,#6366F1);
  --home-hero:linear-gradient(135deg,#1E2D45 0%,#111827 100%);
  --shadow:0 1px 3px rgba(0,0,0,.4);--shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --progress-track:#1E2D45;--toggle-bg:#1E2D45;--toggle-knob:#4A6080;
  --input-bg:#111827;--input-border:#1E2D45;
  --mono:ui-monospace,'Cascadia Code',Consolas,'SF Mono',Menlo,monospace;
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--r:8px;
}
[data-theme="light"]{
  --bg:#EEF2FF;--bg2:#FFFFFF;--card:#FFFFFF;--card2:#F5F7FF;
  --border:#DDE3F4;--border2:#C7D0EA;
  --blue:#4F46E5;--blue-dim:#3730A3;--bglow:rgba(79,70,229,.12);--bsoft:rgba(79,70,229,.07);
  --green:#059669;--gsoft:rgba(5,150,105,.1);
  --amber:#D97706;--asoft:rgba(217,119,6,.1);
  --red:#DC2626;--rsoft:rgba(220,38,38,.1);
  --purple:#7C3AED;--psoft:rgba(124,58,237,.1);
  --text:#1E1B4B;--text2:#4B5563;--text3:#9CA3AF;
  --sbg:linear-gradient(180deg,#4338CA 0%,#6D28D9 55%,#7C3AED 100%);
  --sborder:rgba(255,255,255,.15);--snav-text:rgba(255,255,255,.75);--snav-active:#FFFFFF;
  --snav-hover:rgba(255,255,255,.12);--snav-activebg:rgba(255,255,255,.2);
  --logo-text:#FFFFFF;--badge-bg:rgba(255,255,255,.2);--badge-color:#FFFFFF;
  --btn-grad:linear-gradient(135deg,#4F46E5,#7C3AED);
  --home-hero:linear-gradient(135deg,#4F46E5 0%,#7C3AED 100%);
  --shadow:0 1px 4px rgba(79,70,229,.1),0 0 0 1px rgba(79,70,229,.05);
  --shadow-lg:0 8px 32px rgba(79,70,229,.15);
  --progress-track:#DDE3F4;--toggle-bg:#DDE3F4;--toggle-knob:#9CA3AF;
  --input-bg:#F5F7FF;--input-border:#DDE3F4;
}

/* ── LAYOUT ── */
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;overflow:hidden;transition:background .3s,color .3s}
body{zoom:1.1}
/* NOTE: if the zoom value changes, update the calc(100vh/1.1) heights on
   .app and .acct-panel to match, or the footer falls off-screen. */
.app{display:grid;grid-template-columns:272px 1fr;height:calc(100vh/1.1)}

/* ── SIDEBAR ── */
.sidebar{background:var(--sbg);border-right:1px solid var(--sborder);display:flex;flex-direction:column;overflow:hidden;transition:background .3s}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--sborder);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer}
.logo:hover{filter:brightness(1.15)}
.logo-icon{width:32px;height:32px;background:transparent;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 20px rgba(139,92,246,.45)}
.logo-icon svg{display:block}
.logo-text{font-size:13px;font-weight:700;color:var(--logo-text);letter-spacing:.02em}
.logo-sub{font-size:10px;color:var(--snav-text);font-family:var(--mono)}
.v-badge{font-size:10px;background:var(--badge-bg);color:var(--badge-color);border-radius:5px;padding:2px 7px;font-family:var(--mono);margin-left:auto;border:1px solid rgba(255,255,255,.1)}
.progress-wrap{margin-top:2px}
.pl{display:flex;justify-content:space-between;font-size:10px;color:var(--snav-text);margin-bottom:5px;font-family:var(--mono)}
.pt{height:4px;background:var(--progress-track);border-radius:99px;overflow:hidden}
.pf{height:100%;background:var(--btn-grad);border-radius:99px;transition:width .6s ease}

/* sidebar nav */
.snav{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.nav-section{font-size:10px;color:var(--snav-text);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 4px;opacity:.7}
.nb{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:var(--r);margin-bottom:2px;transition:all .15s;position:relative;display:flex;align-items:center;gap:9px}
.nb:hover:not(.locked){background:var(--snav-hover)}
.nb.active{background:var(--snav-activebg)}
.nb.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:65%;background:white;border-radius:0 3px 3px 0;opacity:.9}
.nb.locked{opacity:.35;cursor:not-allowed}
.ni{font-size:15px;flex-shrink:0}
.nt{flex:1;min-width:0}
.nl{font-size:10px;color:var(--snav-text);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.ntt{font-size:12px;font-weight:500;color:var(--snav-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nb.active .ntt,.nb.active .nl{color:var(--snav-active)}
.nmb{height:2px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin-top:3px}
.nmf{height:100%;border-radius:99px;transition:width .4s}

/* budget panel */
.bp{border-top:1px solid var(--sborder);padding:12px 16px;flex-shrink:0}
.bpt{font-size:10px;color:var(--snav-text);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.brow{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.bk{font-size:12px;color:var(--snav-text)}
.bv{font-size:13px;font-weight:600;font-family:var(--mono)}
.bv.g{color:#4ade80}.bv.r{color:#f87171}.bv.a{color:#fbbf24}
.bbt{height:3px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin:6px 0}
.bbf{height:100%;border-radius:99px;transition:width .4s}
.bi{display:flex;gap:6px;margin-top:8px}
.bi input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:var(--snav-active);font-family:var(--mono);font-size:12px;padding:6px 9px;outline:none;transition:border-color .15s}
.bi input::placeholder{color:var(--snav-text)}
.bi input:focus{border-color:rgba(255,255,255,.4)}
.bi button{background:var(--btn-grad);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:600;padding:6px 11px;cursor:pointer;transition:opacity .15s}
.bi button:hover{opacity:.88}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);transition:background .3s}
.main-header{padding:16px 28px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;background:var(--bg2);transition:background .3s,border-color .3s}
.mh-left{flex:1;min-width:0}
.mh-eye{font-size:10px;color:var(--blue);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.mh-title{font-size:19px;font-weight:600;color:var(--text);line-height:1.3}
.mh-sub{font-size:12px;color:var(--text2);margin-top:3px}
.mh-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:7px 13px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:16px;font-weight:600;font-family:var(--mono)}
.stat-num.b{color:var(--blue)}.stat-num.g{color:var(--green)}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}

/* theme toggle */
.theme-toggle{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:99px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.theme-toggle:hover{border-color:var(--blue)}
.theme-icon{font-size:15px;transition:transform .3s}
.theme-label{font-size:11px;font-weight:500;color:var(--text2);font-family:var(--mono)}

/* tabs */
.tbar{display:flex;gap:1px;padding:0 28px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);overflow-x:auto;scrollbar-width:none;transition:background .3s,border-color .3s}
.tbar::-webkit-scrollbar{display:none}
.tbtn{background:none;border:none;cursor:pointer;padding:9px 14px;font-size:12px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tbtn:hover{color:var(--text2)}
.tbtn.active{color:var(--blue);border-bottom-color:var(--blue)}

/* content */
.con{flex:1;overflow-y:auto;padding:22px 28px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

/* ── HOME PAGE ── */
.home-hero{border-radius:16px;padding:28px 32px;margin-bottom:24px;background:var(--home-hero);position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05)}
.home-hero::after{content:'';position:absolute;right:40px;bottom:-40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.6);margin-bottom:6px}
.hero-title{font-size:24px;font-weight:700;color:#FFFFFF;margin-bottom:6px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.7);max-width:460px}
.hero-stats{display:flex;gap:24px;margin-top:18px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat-num{font-size:26px;font-weight:700;font-family:var(--mono);color:#FFFFFF}
.hero-stat-lbl{font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

.courses-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px}
.course-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.course-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--border2)}
.cc-header{padding:18px 20px 14px;position:relative;overflow:hidden}
.cc-icon{font-size:28px;margin-bottom:8px;display:block;position:relative;z-index:1}
.cc-name{font-size:16px;font-weight:700;color:#FFFFFF;margin-bottom:3px;position:relative;z-index:1}
.cc-desc{font-size:11px;color:rgba(255,255,255,.75);position:relative;z-index:1;line-height:1.5}
.cc-glow{position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08)}
.cc-body{padding:16px 20px}
.cc-progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px;font-family:var(--mono)}
.cc-bar{height:5px;background:var(--progress-track);border-radius:99px;overflow:hidden;margin-bottom:12px}
.cc-bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.cc-action{display:flex;align-items:center;justify-content:space-between}
.cc-tasks{font-size:11px;color:var(--text3)}
.cc-btn{background:var(--btn-grad);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;transition:opacity .15s}
.cc-btn:hover{opacity:.88}

.quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.qa-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.qa-card:hover{border-color:var(--blue);background:var(--bsoft)}
.qa-icon{font-size:22px;margin-bottom:6px}
.qa-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.qa-desc{font-size:11px;color:var(--text3)}

/* ── COURSE CONTENT ── */
.sg{margin-bottom:22px}
.se{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:9px;display:flex;align-items:center;gap:10px}
.se::after{content:'';flex:1;height:1px;background:var(--border)}

/* tasks */
.tc{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;transition:border-color .2s;box-shadow:var(--shadow)}
.tc:hover{border-color:var(--border2)}
.tc.done{opacity:.5}
.tc.done .tx{text-decoration:line-through;color:var(--text3)}
.tc-top{padding:11px 13px;display:flex;gap:11px;align-items:flex-start}
.ck{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.tc.done .ck{background:var(--green);border-color:var(--green)}
.ck svg{display:none}
.tc.done .ck svg{display:block}
.tb2{flex:1;min-width:0}
.dt{display:inline-block;font-size:10px;font-family:var(--mono);color:var(--blue);background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-radius:4px;padding:1px 6px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.tx{font-size:13px;color:var(--text);line-height:1.6}
.tx strong{font-weight:600}
.tt{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.exp-btn{background:none;border:1px solid var(--border);cursor:pointer;padding:4px 9px;border-radius:6px;color:var(--text3);font-size:11px;font-family:var(--mono);display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;transition:all .15s;align-self:flex-start;margin-top:1px}
.exp-btn:hover{color:var(--blue);border-color:var(--blue);background:var(--bsoft)}
.exp-btn.open{color:var(--blue);border-color:var(--blue);background:var(--bsoft)}
.exp-chev{font-size:8px;transition:transform .2s;display:inline-block}
.exp-btn.open .exp-chev{transform:rotate(180deg)}
.steps-panel{display:none;padding:0 13px 13px 44px;border-top:1px solid rgba(255,255,255,.04)}
.steps-panel.open{display:block}
[data-theme="light"] .steps-panel{border-top-color:var(--border)}
.steps-list{margin:10px 0 0;padding:0;list-style:none}
.step-item{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--text2);line-height:1.6}
[data-theme="light"] .step-item{border-bottom-color:var(--border)}
.step-item:last-child{border-bottom:none;padding-bottom:0}
.step-num{font-size:10px;font-family:var(--mono);color:var(--blue);background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-radius:4px;width:20px;height:20px;min-width:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-weight:600}
.step-text{flex:1}
.step-text b{color:var(--text);font-weight:600}
.step-text code{background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:11px;color:var(--blue)}

/* callouts */
.wb{background:var(--asoft);border:1px solid rgba(245,158,11,.25);border-left:3px solid var(--amber);border-radius:var(--r);padding:10px 13px;margin-bottom:7px;display:flex;gap:9px;align-items:flex-start}
.wbt{font-size:13px;color:var(--text2);line-height:1.6}
[data-theme="dark"] .wbt{color:#D4A044}
.wbt strong{color:var(--amber)}
.sb2{background:var(--gsoft);border:1px solid rgba(34,197,94,.2);border-left:3px solid var(--green);border-radius:var(--r);padding:10px 13px;margin-top:7px;display:flex;gap:9px;align-items:flex-start}
.sbt{font-size:13px;color:var(--green);line-height:1.6}
.ib{background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-left:3px solid var(--blue);border-radius:var(--r);padding:10px 13px;margin-bottom:7px;font-size:13px;color:var(--text2);line-height:1.6}
.ib strong{color:var(--blue)}
.mr{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:7px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;text-align:center;box-shadow:var(--shadow)}
.mv{font-size:21px;font-weight:600;font-family:var(--mono);color:var(--blue)}
.ml{font-size:11px;color:var(--text3);margin-top:2px}

/* notes */
.nta{width:100%;min-height:200px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;resize:vertical;outline:none;transition:border-color .15s;line-height:1.6}
.nta:focus{border-color:var(--blue)}
.nta::placeholder{color:var(--text3)}

/* tracker */
.ts{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:14px}
.tsv{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;text-align:center;box-shadow:var(--shadow)}
.tsvv{font-size:17px;font-weight:600;font-family:var(--mono)}
.tsvl{font-size:10px;color:var(--text3);margin-top:2px}
.trh{display:grid;grid-template-columns:80px 1fr 65px 55px 50px 50px 55px 55px 70px 72px;gap:5px;padding:7px 9px;font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.trr{display:grid;grid-template-columns:80px 1fr 65px 55px 50px 50px 55px 55px 70px 72px;gap:5px;padding:7px 9px;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.trr:hover{background:var(--card2)}
.trr input{background:transparent;border:none;color:var(--text);font-family:var(--mono);font-size:12px;width:100%;outline:none;padding:2px 3px;border-radius:3px;transition:background .15s}
.trr input:focus{background:var(--card2)}
.tcc{font-family:var(--mono);font-size:12px;text-align:right}
.pp{color:var(--green)}.pn{color:var(--red)}.pz{color:var(--text3)}
.arb{display:flex;align-items:center;gap:7px;padding:9px 11px;font-size:12px;color:var(--text3);cursor:pointer;border-top:1px solid var(--border);transition:color .15s;background:none;border-bottom:none;border-left:none;border-right:none;width:100%;text-align:left}
.arb:hover{color:var(--blue)}

/* ai tools */
.aic{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.aih{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.aii{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.aitt{font-size:14px;font-weight:600;color:var(--text)}
.aid{font-size:12px;color:var(--text2);margin-top:1px}
.ao{background:var(--input-bg);border:1px solid var(--input-border);border-radius:var(--r);padding:13px;margin-top:11px;font-size:13px;color:var(--text2);line-height:1.7;min-height:55px;white-space:pre-wrap;max-height:320px;overflow-y:auto;scrollbar-width:thin}
.ao.ld{color:var(--text3);font-style:italic}
.ao.er{color:var(--red);font-style:italic}
.flbl{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.ti,.tta,.tsel{background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;width:100%}
.ti:focus,.tta:focus,.tsel:focus{border-color:var(--blue)}
.ti::placeholder,.tta::placeholder{color:var(--text3)}
.tta{resize:vertical;min-height:65px;line-height:1.6;font-family:var(--sans)}
.fr{display:flex;gap:7px;margin-bottom:9px;align-items:flex-start}
.fg{flex:1}
.bb{background:var(--btn-grad);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:600;padding:8px 14px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.bb:hover{opacity:.88}
.bb:disabled{opacity:.4;cursor:not-allowed}

/* flags */
.fi{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
.fi:last-child{border-bottom:none}
.ft{font-size:13px;line-height:1.5}
.ft strong{display:block;margin-bottom:1px}
.fdg{color:var(--red)}.fw{color:var(--amber)}.fd{color:var(--green)}
.fbadge{display:inline-block;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.bda{background:var(--rsoft);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.bwa{background:var(--asoft);color:var(--amber);border:1px solid rgba(217,119,6,.2)}

/* scorecard */
.scg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sci{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;box-shadow:var(--shadow)}
.scl{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.sci2{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 9px;outline:none;transition:border-color .15s}
.sci2:focus{border-color:var(--blue)}
.ssr{display:flex;align-items:center;gap:9px}
.ss{flex:1;accent-color:var(--blue)}
.ssv{font-family:var(--mono);font-size:13px;color:var(--blue);min-width:18px}
.scr{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.svd{font-size:20px;font-weight:700;font-family:var(--mono);margin-bottom:5px}
.sbd{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:12px}
.scel{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r);padding:9px;text-align:center}
.scelv{font-size:15px;font-weight:600;font-family:var(--mono)}
.scell{font-size:10px;color:var(--text3);margin-top:2px}
.sceld{font-size:9px;color:var(--text3);margin-top:2px}
.spass{color:var(--green)}.sfail{color:var(--red)}.swarn{color:var(--amber)}
.sbt2{height:7px;background:var(--progress-track);border-radius:99px;overflow:hidden;margin-top:9px}
.sbf{height:100%;border-radius:99px;transition:width .5s}

/* diagnosis */
.ds{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.dq{font-size:14px;font-weight:600;color:var(--text);margin-bottom:11px}
.do2{display:flex;flex-direction:column;gap:7px}
.dopt{background:var(--input-bg);border:1px solid var(--input-border);border-radius:var(--r);padding:10px 13px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;text-align:left;width:100%}
.dopt:hover{border-color:var(--blue);color:var(--text)}
.dr{background:var(--card);border:2px solid var(--blue);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.drt{font-size:15px;font-weight:600;color:var(--blue);margin-bottom:7px}
.drb{font-size:13px;color:var(--text2);line-height:1.7}
.da{background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-radius:var(--r);padding:9px 13px;margin-top:11px;font-size:13px;color:var(--blue)}
.drst{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:12px;padding:6px 13px;cursor:pointer;margin-top:9px;transition:all .15s}
.drst:hover{border-color:var(--blue);color:var(--blue)}

/* milestones */
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:18px}
.msc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;display:flex;gap:11px;align-items:flex-start;transition:all .2s;box-shadow:var(--shadow)}
.msc.ach{border-color:rgba(5,150,105,.35);background:var(--gsoft)}
.mbg{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;background:var(--input-bg);border:1px solid var(--border)}
.msc.ach .mbg{background:var(--gsoft);border-color:rgba(5,150,105,.3)}
.mtt{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px}
.mds{font-size:12px;color:var(--text2)}
.mst{font-size:10px;font-family:var(--mono);margin-top:3px}
.msd{color:var(--green)}.msp{color:var(--text3)}
.skc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.skfl{font-size:34px;line-height:1}
.skn{font-size:38px;font-weight:700;font-family:var(--mono);color:var(--amber);line-height:1}
.skl{font-size:13px;color:var(--text2);margin-top:1px}
.skb2{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.cib{margin-left:auto;background:linear-gradient(135deg,var(--amber),#F97316);border:none;border-radius:var(--r);color:#000;font-size:13px;font-weight:700;padding:9px 16px;cursor:pointer;transition:opacity .15s}
.cib:hover{opacity:.88}
.cib:disabled{opacity:.4;cursor:not-allowed}

/* roadmap */
.ri{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.ri:last-child{border-bottom:none}
.rn{width:27px;height:27px;background:var(--bsoft);border:1px solid rgba(79,70,229,.3);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue);font-family:var(--mono);flex-shrink:0}
.rc h4{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.rc p{font-size:13px;color:var(--text2);line-height:1.6}
.tli{display:flex;gap:13px;padding:8px 0}
.tld{width:9px;height:9px;border-radius:50%;background:var(--blue);margin-top:5px;flex-shrink:0;box-shadow:0 0 7px var(--blue)}
.tlb h4{font-size:13px;font-weight:600;color:var(--text)}
.tlb p{font-size:12px;color:var(--text2);margin-top:1px}
.toog{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.tooc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow)}
.tood{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.toon{font-size:13px;font-weight:500;color:var(--text)}
.toodd{font-size:11px;color:var(--text3);margin-top:1px}
.toobg{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:4px;margin-left:auto;flex-shrink:0}
.fre{background:var(--gsoft);color:var(--green);border:1px solid rgba(5,150,105,.2)}
.pai{background:var(--asoft);color:var(--amber);border:1px solid rgba(217,119,6,.2)}

/* confetti & toast */
@keyframes cf-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.cp{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:cf-fall linear forwards;z-index:9999}
.toast{position:fixed;bottom:22px;right:22px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;color:var(--text);z-index:9999;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;transform:translateY(80px);opacity:0;transition:all .3s ease;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.tikn{font-size:17px}


/* ── ACCOUNT BUTTON ── */
.acct-btn{display:flex;align-items:center;gap:7px;padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:99px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.acct-btn:hover{border-color:var(--blue)}
.acct-avatar{font-size:15px}
.acct-name{font-size:11px;font-weight:600;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── SETUP OVERLAY ── */
.overlay{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.setup-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;max-width:460px;width:100%;box-shadow:var(--shadow-lg);text-align:center}
.setup-logo{font-size:48px;margin-bottom:16px}
.setup-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px}
.setup-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:28px}
.setup-form{text-align:left}
.setup-field{margin-bottom:18px}
.setup-label{display:block;font-size:11px;font-weight:600;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.setup-input{width:100%;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--r);color:var(--text);font-size:15px;padding:11px 14px;outline:none;transition:border-color .15s;font-family:var(--sans)}
.setup-input:focus{border-color:var(--blue)}
.setup-input::placeholder{color:var(--text3)}
.setup-budget-row{display:flex;align-items:center;gap:0}
.setup-dollar{background:var(--input-bg);border:1.5px solid var(--input-border);border-right:none;border-radius:var(--r) 0 0 var(--r);padding:11px 12px;font-size:15px;color:var(--text3);font-family:var(--mono)}
.setup-budget-row .setup-input{border-radius:0 var(--r) var(--r) 0}
.setup-hint{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5}
.setup-btn{width:100%;background:var(--btn-grad);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;padding:14px;cursor:pointer;margin-top:8px;transition:opacity .15s;box-shadow:0 4px 14px rgba(79,70,229,.35)}
.setup-btn:hover{opacity:.9}
.setup-error{color:var(--red);font-size:12px;margin-top:6px;text-align:center;min-height:18px}

/* ── ACCOUNT PANEL ── */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:8000;display:none;backdrop-filter:blur(2px)}
.panel-overlay.open{display:block}
.acct-panel{position:fixed;top:0;right:0;height:calc(100vh/1.1);width:340px;background:var(--bg2);border-left:1px solid var(--border);z-index:8001;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.acct-panel.open{transform:translateX(0)}
.acct-panel-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.acct-panel-title{font-size:16px;font-weight:600;color:var(--text)}
.panel-close{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:14px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.panel-close:hover{border-color:var(--red);color:var(--red)}
.acct-panel-body{flex:1;overflow-y:auto;padding:16px 20px;scrollbar-width:thin}

/* account panel sections */
.ap-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.ap-sec-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px}
.ap-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ap-row:last-child{margin-bottom:0}
.ap-key{font-size:13px;color:var(--text2)}
.ap-val{font-size:13px;font-weight:600;color:var(--text);font-family:var(--mono)}
.ap-edit-btn{background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-radius:6px;color:var(--blue);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;transition:all .15s}
.ap-edit-btn:hover{background:var(--blue);color:#fff}
.ap-input-row{display:flex;gap:7px;margin-top:8px}
.ap-input{flex:1;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s;font-family:var(--mono)}
.ap-input:focus{border-color:var(--blue)}
.ap-save-btn{background:var(--btn-grad);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer}
.ap-stat{text-align:center}
.ap-stat-num{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--blue)}
.ap-stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.ap-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
.danger-btn{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:13px;font-weight:500;padding:10px;cursor:pointer;transition:all .15s;margin-bottom:8px;text-align:left;display:flex;align-items:center;gap:8px}
.danger-btn:hover{border-color:var(--red);color:var(--red);background:var(--rsoft)}
.danger-btn:last-child{margin-bottom:0}
.danger-btn .dbicon{font-size:15px}
.confirm-zone{background:var(--rsoft);border:1px solid rgba(220,38,38,.3);border-radius:var(--r);padding:12px;margin-top:8px}
.confirm-text{font-size:12px;color:var(--red);margin-bottom:10px;line-height:1.5}
.confirm-btns{display:flex;gap:7px}
.confirm-yes{flex:1;background:var(--red);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:600;padding:8px;cursor:pointer}
.confirm-no{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;font-weight:500;padding:8px;cursor:pointer}

/* ── INTELLIGENCE PANEL ── */
.intel-modal{position:fixed;inset:0;background:var(--bg);z-index:7000;overflow-y:auto;padding:24px}
.intel-modal-inner{max-width:720px;margin:0 auto}
.intel-back{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:20px;padding:0;transition:color .15s}
.intel-back:hover{color:var(--blue)}
.intel-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.intel-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.intel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.intel-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.intel-card.full{grid-column:1/-1}
.intel-card-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px}
/* score ring */
.score-ring-wrap{display:flex;align-items:center;gap:20px;margin-bottom:14px}
.score-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-bg{fill:none;stroke:var(--progress-track);stroke-width:8}
.score-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;font-family:var(--mono)}
.score-info{}
.score-label{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px}
.score-status{font-size:12px;padding:3px 9px;border-radius:99px;display:inline-block;font-weight:600;font-family:var(--mono)}
.st-broken{background:var(--rsoft);color:var(--red)}
.st-struggling{background:var(--asoft);color:var(--amber)}
.st-improving{background:#FEF3C7;color:#92400E}
[data-theme="dark"] .st-improving{background:rgba(251,191,36,.1);color:#FBBF24}
.st-healthy{background:var(--gsoft);color:var(--green)}
/* component scores */
.comp-scores{display:flex;flex-direction:column;gap:8px}
.comp-row{display:flex;align-items:center;gap:10px}
.comp-label{font-size:11px;color:var(--text2);width:80px;flex-shrink:0}
.comp-bar-track{flex:1;height:6px;background:var(--progress-track);border-radius:99px;overflow:hidden}
.comp-bar-fill{height:100%;border-radius:99px;transition:width .6s}
.comp-pts{font-size:11px;font-family:var(--mono);color:var(--text3);width:38px;text-align:right;flex-shrink:0}
/* diagnosis */
.diag-box{background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-radius:var(--r);padding:12px 14px;margin-top:12px}
.diag-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:5px}
.diag-text{font-size:13px;color:var(--text2);line-height:1.6}
/* velocity */
.vel-main{font-size:26px;font-weight:700;font-family:var(--mono);color:var(--text);margin-bottom:4px}
.vel-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
.vel-alert{display:flex;gap:9px;align-items:flex-start;padding:10px 12px;border-radius:var(--r);font-size:12px;line-height:1.5}
.vel-ok{background:var(--gsoft);border:1px solid rgba(5,150,105,.2);color:var(--green)}
.vel-warn{background:var(--asoft);border:1px solid rgba(217,119,6,.2);color:var(--amber)}
.vel-danger{background:var(--rsoft);border:1px solid rgba(220,38,38,.2);color:var(--red)}
.vel-stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.vel-stat{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;text-align:center;flex:1;min-width:80px}
.vel-stat-num{font-size:16px;font-weight:600;font-family:var(--mono);color:var(--text)}
.vel-stat-lbl{font-size:10px;color:var(--text3);margin-top:2px}
/* best ad */
.best-ad-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:10px;word-break:break-all}
.best-ad-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.bas{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r);padding:9px;text-align:center}
.bas-num{font-size:15px;font-weight:600;font-family:var(--mono);color:var(--blue)}
.bas-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.best-vs{font-size:13px;color:var(--text2);line-height:1.6}
.ad-rank-list{margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
.ad-rank-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)}
.ad-rank-row:last-child{border-bottom:none}
.ad-rank-pos{width:20px;height:20px;border-radius:50%;background:var(--bsoft);color:var(--blue);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono)}
.ad-rank-name{flex:1;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ad-rank-cpc{color:var(--text3);font-family:var(--mono);font-size:11px}
.no-data-state{text-align:center;padding:40px 20px}
.no-data-icon{font-size:40px;margin-bottom:12px}
.no-data-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.no-data-sub{font-size:13px;color:var(--text2);line-height:1.6}


/* ── NEW TOOL GRID ── */
.tools-grid-sm{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.qa-sm{padding:12px!important}
.qa-sm .qa-icon{font-size:18px!important;margin-bottom:4px!important}
.qa-sm .qa-title{font-size:12px!important}
.qa-sm .qa-desc{font-size:10px!important}

/* ── TOOL VIEW WRAPPER ── */
.tool-view{max-width:800px}
.tool-view-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.tv-back{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:12px;padding:6px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.tv-back:hover{border-color:var(--blue);color:var(--blue)}
.tv-icon{font-size:26px}
.tv-title{font-size:20px;font-weight:700;color:var(--text)}
.tv-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* ── BRIDGE PAGE GENERATOR ── */
.bridge-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.bridge-layout{grid-template-columns:1fr}}
.bridge-form{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.bridge-output{display:flex;flex-direction:column;gap:10px}
.bridge-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow)}
.bridge-sec-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.copy-btn{background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-radius:5px;color:var(--blue);font-size:10px;font-family:var(--mono);padding:2px 8px;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:var(--blue);color:#fff}
.copy-btn.copied{background:var(--gsoft);border-color:rgba(5,150,105,.2);color:var(--green)}
.bridge-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;min-height:40px}
.bridge-placeholder{font-size:13px;color:var(--text3);font-style:italic;text-align:center;padding:20px 0}
.gen-btn{width:100%;background:var(--btn-grad);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:700;padding:12px;cursor:pointer;margin-top:10px;transition:opacity .15s;box-shadow:0 4px 12px rgba(79,70,229,.3)}
.gen-btn:hover{opacity:.9}
.gen-btn:disabled{opacity:.4;cursor:not-allowed}
.field-group{margin-bottom:12px}
.field-label{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px;display:block}
.field-input,.field-ta,.field-sel{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:var(--r);color:var(--text);font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s;font-family:var(--sans)}
.field-input:focus,.field-ta:focus,.field-sel:focus{border-color:var(--blue)}
.field-input::placeholder,.field-ta::placeholder{color:var(--text3)}
.field-ta{resize:vertical;min-height:60px;line-height:1.6}

/* ── A/B TEST TRACKER ── */
.ab-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ab-stats{display:flex;gap:10px}
.ab-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;text-align:center;box-shadow:var(--shadow)}
.ab-stat-num{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--blue)}
.ab-stat-lbl{font-size:10px;color:var(--text3)}
.add-btn{background:var(--btn-grad);border:none;border-radius:var(--r);color:#fff;font-size:12px;font-weight:600;padding:8px 14px;cursor:pointer;transition:opacity .15s}
.add-btn:hover{opacity:.88}
.ab-table{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.ab-th{display:grid;grid-template-columns:80px 70px 100px 1fr 1fr 90px 80px;gap:8px;padding:9px 12px;font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg2)}
.ab-row{display:grid;grid-template-columns:80px 70px 100px 1fr 1fr 90px 80px;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;align-items:center;cursor:pointer;transition:background .15s}
.ab-row:hover{background:var(--card2)}
.ab-row:last-child{border-bottom:none}
.ab-cell{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ab-cell.name{color:var(--text);font-weight:500}
.winner-badge{display:inline-block;font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:99px;font-weight:600}
.w-control{background:var(--bsoft);color:var(--blue)}
.w-variant{background:var(--gsoft);color:var(--green)}
.w-inc{background:var(--asoft);color:var(--amber)}
.ab-type-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-family:var(--mono);background:var(--input-bg);color:var(--text3);border:1px solid var(--border)}
.ab-expand{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:1px;display:none}
.ab-expand.open{display:block}
.ab-expand-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.ab-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ab-empty{text-align:center;padding:40px 20px;color:var(--text3)}

/* ── OFFER VAULT ── */
.vault-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.status-filter{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.sf-btn{background:var(--card);border:1px solid var(--border);border-radius:99px;color:var(--text2);font-size:11px;font-family:var(--mono);padding:4px 12px;cursor:pointer;transition:all .15s}
.sf-btn.active,.sf-btn:hover{background:var(--btn-grad);border-color:transparent;color:#fff}
.vault-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.vault-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.vault-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.vc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.vc-name{font-size:15px;font-weight:700;color:var(--text)}
.vc-status{font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:99px;font-weight:600;flex-shrink:0;margin-left:8px}
.vs-evaluating{background:var(--bsoft);color:var(--blue)}
.vs-testing{background:var(--asoft);color:var(--amber)}
.vs-winner{background:var(--gsoft);color:var(--green)}
.vs-paused{background:var(--input-bg);color:var(--text3);border:1px solid var(--border)}
.vs-eliminated{background:var(--rsoft);color:var(--red)}
.vc-metrics{display:flex;gap:12px;margin-bottom:8px}
.vc-metric{font-size:11px;color:var(--text3)}
.vc-metric span{color:var(--text);font-weight:600;font-family:var(--mono)}
.vc-score{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.vc-score-bar{flex:1;height:4px;background:var(--progress-track);border-radius:99px;overflow:hidden}
.vc-score-fill{height:100%;border-radius:99px}
.vc-score-num{font-size:11px;font-family:var(--mono);color:var(--text2)}
.vc-notes{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc-date{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:6px}
.vault-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.vault-modal-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}

.undo-btn{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--blue);font-size:12px;font-weight:600;padding:3px 10px;margin-left:8px;cursor:pointer}
.undo-btn:hover{border-color:var(--blue)}

/* ── FOOTER ── */
.footer{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px 12px;padding:8px 28px;border-top:1px solid var(--border);background:var(--bg2);font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.04em;transition:background .3s,border-color .3s}

/* ── INFO EXPLAINERS ── */
.info-btn{margin-left:auto;flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.info-btn:hover{border-color:var(--blue);color:var(--blue)}
.hk-info{background:var(--bsoft);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin:10px 0 12px;font-size:12px;color:var(--text2);line-height:1.65}
.hk-info p{margin-bottom:8px}
.hk-info p:last-child{margin-bottom:0}
.hki-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
.home-hero .info-btn{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.8);z-index:2}
.se .info-btn{margin-left:0}


/* ── TRACKER CHART ── */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.chart-legend{display:flex;gap:16px;font-size:11px;color:var(--text2);margin-bottom:8px}
.lg-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.chart-empty{background:var(--card);border:1px dashed var(--border);border-radius:10px;padding:16px;font-size:12px;color:var(--text3);text-align:center;margin-bottom:14px}
.chart-card svg text{font-family:var(--mono)}

/* ── RESPONSIVE / MOBILE ── */
.menu-btn{display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;width:38px;height:38px;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;margin-right:12px}
.mobile-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8400;display:none;backdrop-filter:blur(2px)}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:8500;transform:translateX(-105%);transition:transform .3s ease;box-shadow:var(--shadow-lg)}
  .sidebar.mopen{transform:translateX(0)}
  .mobile-backdrop.show{display:block}
  .menu-btn{display:flex}
  .main-header{padding:12px 14px;align-items:center}
  .stat-pill{display:none}
  .theme-label,.acct-name{display:none}
  .mh-title{font-size:16px}
  .mh-sub{display:none}
  .con{padding:14px!important}
  .footer{padding:6px 14px}
  .courses-grid,.quick-actions,.scg,.mg,.toog,.intel-grid,.vault-grid,.bridge-layout,.ab-form-grid,.vault-form-grid,.export-sections,.ab-expand-grid{grid-template-columns:1fr}
  .ts,.review-metrics,.sbd,.best-ad-stats{grid-template-columns:repeat(2,1fr)}
  .tools-grid-sm{grid-template-columns:1fr 1fr}
  .trh,.trr{grid-template-columns:80px 160px 65px 55px 50px 50px 55px 55px 70px 72px;min-width:680px}
  .ab-th,.ab-row{min-width:620px}
  .sg div[style*="overflow:hidden"],.tool-view div[style*="overflow:hidden"]{overflow-x:auto!important}
  .search-overlay{padding:40px 12px 12px}
}

/* ── GLOBAL SEARCH ── */
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9500;display:none;align-items:flex-start;justify-content:center;padding:80px 20px 20px;backdrop-filter:blur(3px)}
.search-overlay.open{display:flex}
.search-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);overflow:hidden}
.search-inp{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;padding:16px 18px;font-family:var(--sans);border-bottom:1px solid var(--border)}
.search-results{max-height:55vh;overflow-y:auto}
.search-item{padding:11px 18px;cursor:pointer;border-bottom:1px solid var(--border)}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:var(--bsoft)}
.search-item-meta{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.search-item-text{font-size:13px;color:var(--text);line-height:1.45}
.search-empty{padding:20px 18px;color:var(--text3);font-size:13px;text-align:center}
.vm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.vm-title{font-size:17px;font-weight:700;color:var(--text)}
.vault-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vault-empty{text-align:center;padding:40px 20px}

/* ── WEEKLY REVIEW ── */
.review-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.review-week-label{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.review-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.rm{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center}
.rm-num{font-size:17px;font-weight:700;font-family:var(--mono);color:var(--text)}
.rm-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.rm-delta{font-size:10px;font-family:var(--mono);margin-top:2px}
.delta-up{color:var(--green)}.delta-dn{color:var(--red)}.delta-nil{color:var(--text3)}
.review-q{margin-bottom:12px}
.review-q-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px}
.review-q-hint{font-size:11px;color:var(--text3);margin-bottom:5px}
.review-history{margin-top:20px}
.rh-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.rh-item:hover{border-color:var(--blue)}
.rh-date{font-size:13px;font-weight:600;color:var(--text)}
.rh-summary{font-size:11px;color:var(--text3);margin-top:2px}
.rh-arrow{font-size:12px;color:var(--text3)}
.start-review-btn{width:100%;background:var(--btn-grad);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:13px;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 12px rgba(79,70,229,.3);transition:opacity .15s}
.start-review-btn:hover{opacity:.9}

/* ── EMAIL BUILDER ── */
.email-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.email-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.email-num{width:32px;height:32px;background:var(--btn-grad);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--mono)}
.email-day{font-size:13px;font-weight:700;color:var(--text)}
.email-purpose{font-size:11px;color:var(--text3);margin-top:1px}
.email-copy-btn{margin-left:auto;background:var(--bsoft);border:1px solid rgba(79,70,229,.2);border-radius:6px;color:var(--blue);font-size:11px;padding:4px 10px;cursor:pointer;transition:all .15s;font-family:var(--mono)}
.email-copy-btn:hover{background:var(--blue);color:#fff}
.email-fields{display:flex;flex-direction:column;gap:8px}
.email-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.seq-setup{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}

/* ── EXPORT ── */
.export-sections{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.export-sec{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.export-sec-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.export-preview{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:12px;color:var(--text2);line-height:1.8}
.export-btn{background:var(--btn-grad);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:13px 24px;cursor:pointer;box-shadow:0 4px 12px rgba(79,70,229,.3);transition:opacity .15s;display:flex;align-items:center;gap:8px}
.export-btn:hover{opacity:.9}
@media print{
  .sidebar,.main-header,.tbar,.theme-toggle,.acct-btn,.tv-back,.footer{display:none!important}
  .main{overflow:visible!important}

/* scrollbars */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── HOME SIDEBAR SECTIONS ── */
.sb-section{padding:14px 16px;border-bottom:1px solid var(--sborder)}
.sb-section:last-child{border-bottom:none}
.sb-sec-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--snav-text);opacity:.6;margin-bottom:10px}

/* Today's Focus */
.focus-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:11px 12px;cursor:pointer;transition:all .15s}
.focus-card:hover{background:rgba(255,255,255,.12)}
.focus-day{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.focus-text{font-size:12px;color:rgba(255,255,255,.9);line-height:1.45;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.focus-meta{font-size:10px;color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:space-between}
.focus-arrow{font-size:11px;color:rgba(255,255,255,.7)}
.focus-empty{font-size:12px;color:rgba(255,255,255,.5);text-align:center;padding:10px 0}

/* Platform status */
.platform-row{display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer;transition:opacity .15s;border-radius:5px}
.platform-row:hover{opacity:.85}
.platform-row:last-child{}
.prow-icon{font-size:14px;flex-shrink:0}
.prow-info{flex:1;min-width:0}
.prow-name{font-size:11px;font-weight:600;color:var(--snav-active);line-height:1.2}
.prow-week{font-size:10px;color:var(--snav-text);opacity:.7;margin-bottom:3px}
.prow-bar{height:2px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}
.prow-fill{height:100%;border-radius:99px;transition:width .4s}
.prow-pct{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.5);min-width:28px;text-align:right}

/* Streak */
.streak-row{display:flex;align-items:center;gap:10px}
.streak-flame{font-size:24px;line-height:1}
.streak-info{flex:1}
.streak-num{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--amber);line-height:1}
.streak-lbl{font-size:10px;color:var(--snav-text);opacity:.7;margin-top:1px}
.checkin-sb{background:linear-gradient(135deg,var(--amber),#F97316);border:none;border-radius:6px;color:#000;font-size:11px;font-weight:700;padding:7px 10px;cursor:pointer;white-space:nowrap;transition:opacity .15s;flex-shrink:0}
.checkin-sb:hover{opacity:.88}
.checkin-sb:disabled{opacity:.35;cursor:not-allowed}

/* Budget panel (home) */
.budget-sb{}
.budget-row-sb{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.budget-key-sb{font-size:12px;color:var(--snav-text)}
.budget-val-sb{font-size:13px;font-weight:600;font-family:var(--mono)}
.budget-val-sb.g{color:#4ade80}.budget-val-sb.r{color:#f87171}.budget-val-sb.a{color:#fbbf24}
.burn-hint{font-size:10px;color:rgba(255,255,255,.45);margin:5px 0 7px;font-family:var(--mono)}
.budget-bar-sb{height:4px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin-bottom:9px}
.budget-bar-fill-sb{height:100%;border-radius:99px;transition:width .4s}
.spend-row{display:flex;gap:6px}
.spend-row input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:rgba(255,255,255,.9);font-family:var(--mono);font-size:11px;padding:6px 8px;outline:none;transition:border-color .15s}
.spend-row input::placeholder{color:rgba(255,255,255,.3)}
.spend-row input:focus{border-color:rgba(255,255,255,.4)}
.spend-row button{background:var(--btn-grad);border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:600;padding:6px 10px;cursor:pointer;transition:opacity .15s}
.spend-row button:hover{opacity:.88}

/* Next milestone */
.ms-next{display:flex;gap:10px;align-items:flex-start}
.ms-next-icon{font-size:20px;line-height:1;flex-shrink:0}
.ms-next-title{font-size:12px;font-weight:600;color:var(--snav-active);margin-bottom:2px}
.ms-next-hint{font-size:11px;color:rgba(255,255,255,.5);line-height:1.4}
.ms-all-done{font-size:12px;color:rgba(255,255,255,.5);text-align:center;padding:6px 0}
</style>
</head>

<script id="SD" type="application/json">{"fb:w0s0t0": ["Go to <b>clickbank.com</b> and click <b>Create Account</b> in the top right.", "Fill in First Name, Last Name, Email, Country. Choose a <b>Nickname</b> \u2014 this is your permanent affiliate ID, used in every link. Choose carefully; it cannot be changed.", "Click <b>Join ClickBank</b>. Verify your email by clicking the link in the confirmation email.", "Log in &rarr; click your name top-right &rarr; <b>Settings &rarr; Payment Information</b>. Enter your bank details for Direct Deposit (fastest payout).", "Set your <b>Payment Threshold to $10</b> \u2014 the lowest available \u2014 so commissions pay out quickly.", "Click <b>Save</b>. Write your Nickname down. You need it every time you generate an affiliate hoplink."], "fb:w0s0t1": ["Go to <b>business.facebook.com</b>. Click <b>Create Account</b>.", "Enter your <b>legal name</b> (must match your ID) and personal email. Facebook verifies identity \u2014 mismatches cause account restrictions.", "Once inside, go to left sidebar &rarr; <b>Accounts &rarr; Ad Accounts</b>. Click <b>Add &rarr; Create a New Ad Account</b>.", "Name it <b>Weight Loss Campaigns</b>. Set currency to USD and your timezone.", "Add a <b>credit card</b> as payment method: Ad Account &rarr; Settings &rarr; Payment Settings &rarr; Add Payment Method.", "Optionally set a daily spending limit of $20/day under Account Spending Limit as a safety cap while you learn."], "fb:w0s0t2": ["Go to <b>systeme.io</b>. Click <b>Get my free account</b>. Enter your email and create a password.", "Verify your email via the confirmation link. Log in and explore the dashboard \u2014 find <b>Funnels</b>, <b>Emails</b>, and <b>Settings</b>.", "You don't need to build anything yet. Just confirm you can navigate the interface."], "fb:w0s0t3": ["Log into <b>clickbank.com &rarr; Marketplace &rarr; Health &amp; Fitness</b>. Sort by <b>Gravity</b>.", "For each of the top 15 offers, note: <b>Gravity score</b>, <b>Avg $/conversion</b>. Click the sales page link and view it on mobile (resize browser to ~375px wide).", "Score each sales page 1\u20135: load speed, headline quality, trustworthiness, mobile experience, CTA clarity.", "In a doc, create columns: <b>Offer Name | Gravity | Avg $/Conv | Mobile Score | Red Flags</b>. Red flags: before/after photos, specific weight claims like '30 lbs in 30 days', medical language, no testimonials."], "fb:w0s0t4": ["Filter your research doc to offers with <b>Gravity 30\u201380</b>. Below 30 = unproven. Above 80 = likely saturated.", "Keep only offers with <b>Avg $/conversion $35+</b>. Below that, paid traffic profits are nearly impossible.", "Eliminate any offer with before/after photos, specific pound claims, or medical language \u2014 all violate Facebook's ad policies.", "Pick your one best offer. On its ClickBank page, click <b>Promote</b>, enter your Nickname, click <b>Generate Hoplinks</b>. Copy your hoplink and save it."], "fb:w0s1t0": ["Open your chosen offer's sales page at full desktop width. Read the <b>entire page top to bottom</b> \u2014 minimum 60 minutes.", "Write down: the <b>#1 problem</b> it opens with, the <b>exact words and phrases</b> used to describe pain, who the <b>testimonials</b> are from, and the <b>unique mechanism</b> claim.", "Write a one-paragraph summary: who is the ideal buyer, what is their #1 struggle, what transformation is promised."], "fb:w0s1t1": ["Log into <b>systeme.io &rarr; Funnels &rarr; Create</b>. Name it <b>Weight Loss Bridge v1</b>. Choose Custom or Squeeze Page.", "Click <b>Add Step &rarr; Squeeze Page &rarr; Edit Page</b>. Select the <b>simplest blank template</b>.", "Delete all pre-loaded elements. Your page needs only: one headline block, one bullets block, one CTA button."], "fb:w0s1t2": ["Using your sales page notes, write 5 headline drafts using these formulas: <i>'Why I stopped [common approach] and finally [result]'</i> / <i>'The [unusual thing] that's helping [audience] [result]'</i> / <i>'If you've tried [common thing] but still can't [result], read this'</i>.", "Read each draft out loud. Pick the one that sounds most like something a real person would say \u2014 not an ad.", "In Systeme.io, replace the headline placeholder with your chosen headline. Set font to at least 36px Bold. Preview on mobile."], "fb:w0s1t3": ["Write 3\u20135 bullet points that build curiosity without revealing the answer. Formula: <b>'[Hint at something surprising] about [offer-related topic]'</b>. Example: 'Why eating less is actually slowing your weight loss.'", "Each bullet should make the reader think: <i>I need to find out what that means.</i>", "In Systeme.io, add the bullets as a text block (16\u201318px). Add a Button element below. Set text to <b>Watch the short video &rarr;</b> Use orange or green color. Min 200px wide &times; 50px tall. Add small text below: <i>Free video \u2014 no credit card required.</i>"], "fb:w0s1t4": ["Copy your ClickBank hoplink. In Systeme.io, click your CTA button &rarr; URL field &rarr; paste hoplink. Set target to <b>same tab (_self)</b>.", "Preview the page on mobile. Check: headline readable? Button visible above fold without scrolling? Page loads under 3 seconds? Button easy to tap?", "Click the button in preview \u2014 confirm it goes to the correct ClickBank sales page. Click <b>Publish</b>. Copy and save the published page URL."], "fb:w0s2t0": ["In Meta Business Manager, go to <b>Events Manager &rarr; Connect Data Sources &rarr; Web &rarr; Facebook Pixel</b>.", "Name it <b>Bridge Page Pixel</b>. Click <b>Create Pixel</b>. Choose <b>Install code manually</b>.", "Copy your <b>Pixel ID</b> (the 15-16 digit number at the top \u2014 just the number, not the full code). Save it."], "fb:w0s2t1": ["In Systeme.io, go to your funnel &rarr; click the <b>settings gear icon</b> on your bridge page step (not Edit Page).", "Find the <b>Facebook Pixel ID</b> field. Paste your Pixel ID number. Click Save.", "<b>Re-publish the page</b> \u2014 the pixel only activates on the published version, not the draft."], "fb:w0s2t2": ["Install the <b>Meta Pixel Helper</b> Chrome extension from the Chrome Web Store. Pin it to your toolbar.", "Open your bridge page URL. Click the Meta Pixel Helper icon. It should show your Pixel ID in <b>green</b> with a PageView event.", "If red or nothing: check that you pasted the ID (not the full code) in Systeme.io, save, republish, then refresh the page."], "fb:w0s2t3": ["Confirm: ClickBank account active with payment info &check; Bridge page live and loading &check; Pixel fires green &check; Facebook Ad Account has payment method &check;", "In a notes doc, write on one line: <b>Bridge Page URL | ClickBank Hoplink | Pixel ID | Ad Account ID</b>. You'll reference these constantly."], "fb:w1s0t0": ["Go to <b>facebook.com/ads/library</b>. Set Ad Category to All Ads. Set Country to United States.", "Search: <b>weight loss supplement</b>. For each interesting ad, screenshot and note: first line of copy (hook), image style, CTA text.", "Repeat searches: <b>keto diet / belly fat / metabolism / weight loss for women / fat burner</b>. Spend 2+ hours total.", "Group screenshots by hook style (pain, curiosity, social proof, contrarian) and image type. Write a 3-sentence summary of patterns you see."], "fb:w1s0t1": ["Write 2 Pain hooks: <i>'Tried every diet and still gaining weight? Here's what nobody tells you about why.'</i>", "Write 2 Curiosity hooks: <i>'A Japanese morning habit is going viral in the weight loss community \u2014 and the results are shocking.'</i>", "Write 2 Social Proof hooks: <i>'Thousands of women over 45 are calling this the simplest thing they've ever done for their weight.'</i>", "Cross out any containing: specific pound amounts, 'guaranteed', medical claims, or anything that sounds like an ad. Pick the best one of each style \u2014 you now have 3 final hooks."], "fb:w1s0t2": ["For each hook, write 3-paragraph body copy: <b>Para 1 \u2014 Pain/Empathy:</b> 'If you've tried counting calories, cutting carbs, working out \u2014 and still can't seem to lose the weight \u2014 you're not alone. It's probably not your fault.'", "<b>Para 2 \u2014 Curiosity/Pivot:</b> 'But what if the reason nothing is working has nothing to do with your diet at all? A short video explains what most people are completely missing.'", "<b>Para 3 \u2014 CTA:</b> 'Click the link below to watch the free video. It's only a few minutes \u2014 and what you find might change everything.'", "Remove from all copy: specific weight claims, 'guaranteed', before/after references, medical claims. Read aloud \u2014 it should sound conversational, not like an ad."], "fb:w1s0t3": ["Go to <b>canva.com &rarr; Create design &rarr; Facebook Post (1080&times;1080)</b>.", "Create 3 images using the Photos panel: (1) woman confident outdoors, (2) healthy breakfast morning, (3) woman walking in nature. Keep text overlays minimal and vague: 'Finally.' not specific claims.", "<b>Never use:</b> weight scales, measuring tapes, red circles on body parts, before/after comparisons, pills shown prominently.", "Download each as JPG 1080&times;1080. Also save your best at 1080&times;1920 (Canva &rarr; Resize &rarr; Custom) for Stories/Reels placements."], "fb:w1s1t0": ["Go to <b>facebook.com/ads/manager</b>. Click <b>+ Create</b>. Choose <b>Traffic</b> as objective (not Conversions \u2014 pixel has no data yet).", "Name the campaign <b>WT-Test-01</b>. Leave Campaign Budget Optimization OFF. Click Next."], "fb:w1s1t1": ["Name the Ad Set: <b>WL-Women-35-58-US-Broad</b>. Performance goal: Maximize link clicks. Budget: <b>$10.00 daily</b>.", "Audience: Location = United States (People living here). Age = 35\u201358. Gender = Women. <b>Detailed Targeting: leave blank</b> \u2014 broad targeting lets Facebook find buyers. Placements: Advantage+ placements. Click Next."], "fb:w1s1t2": ["Name first ad <b>Ad-01-Pain</b>. Identity: select your Facebook Page. Ad format: Single Image. Upload your best lifestyle image.", "Primary text: paste Pain hook copy. Headline: 'Watch the free video' (max 40 chars). Website URL: <b>your bridge page URL</b>. CTA: Learn More.", "Click <b>Add Another Ad</b>. Create Ad-02-Curiosity (same image, curiosity copy). Add another: Ad-03-SocialProof. Same image, social proof copy. Confirm URL is correct on all 3."], "fb:w1s1t3": ["Pre-publish checklist: &check; Bridge page URL (not hoplink) &check; No policy-violating copy &check; Facebook Page selected &check; Same image on all 3 &check; $10/day budget &check; Women 35\u201358 US", "Click <b>Publish</b>. Status shows 'In Review' \u2014 usually 1\u201324 hours. Do not edit anything while in review."], "fb:w1s2t0": ["Confirm campaign moved from In Review to <b>Active</b>. If rejected, read the reason, fix only the flagged element, resubmit.", "<b>Do not touch anything for 48 hours.</b> The algorithm is in a learning phase. Editing resets it and wastes money. Set a phone alarm for 48 hours labeled 'Check metrics \u2014 observe only.'"], "fb:w1s2t1": ["In Ads Manager, click <b>Columns &rarr; Customize Columns</b>. Add: Delivery, Reach, Impressions, CTR (Link), CPC (Link Click), Link Clicks, Amount Spent. Save as preset: <b>Daily Review</b>.", "Set default date range to Last 7 Days."], "fb:w1s2t2": ["After 48 hrs and $20+ spent, open Ads Manager &rarr; Ads tab. Select Daily Review preset.", "For each ad, write down: Ad name | Spend | CTR | CPC | Link Clicks. Do not make any decisions yet \u2014 this is observation only."], "fb:w2s0t0": ["Open Ads Manager &rarr; Ads tab with Daily Review columns. Set date to 'Since campaign started'.", "Interpret CTR: under 0.5% = weak hook or image; 0.5\u20131% = acceptable; 1%+ = strong. Interpret CPC: under $0.80 = excellent; $0.80\u2013$1.50 = good; $1.50\u2013$2.50 = acceptable; above $2.50 = not working.", "Write down for each ad: CTR | CPC | Total Clicks | Total Spend."], "fb:w2s0t1": ["Identify the ad with <b>lowest CTR and highest CPC</b>. Click the blue toggle to turn it OFF (status: Paused).", "Document in your notes: 'Turned off [ad name] on [date]. CTR: X%, CPC: $X. Hook style: [type].'"], "fb:w2s0t2": ["Identify your <b>best performer</b> (highest CTR, lowest CPC). Study its hook. Ask: What makes it different? More specific? More personal? A demographic detail?", "Write: 'Best hook so far: [exact text]. Why it works: [analysis].' Your next ads will be variations of this hook \u2014 not a different direction."], "fb:w2s0t3": ["Log into ClickBank &rarr; Reporting. Set date range to since campaign started. Find <b>Hops</b> and <b>Orders</b>.", "Calculate conversion rate: Orders &divide; Hops &times; 100. If Hops = 0: bridge page is broken. If Hops &gt; 0, no Orders: offer sales page may be weak. If Orders &gt; 0: calculate Cost Per Sale = Total Spend &divide; Orders."], "fb:w2s1t0": ["Write Variation A: same emotional angle as your best hook, but <b>more specific</b> (add age, situation: 'women over 45 with belly fat after menopause').", "Write Variation B: same emotion, <b>different entry point</b> (if original was frustration, try discovery/hope angle instead).", "Create these as Ad-04 and Ad-05 in your existing Ad Set. Same image. Give each 5\u20137 days before judging."], "fb:w2s1t1": ["Open bridge page on your <b>phone</b>. Check: loads in under 3 seconds? Headline readable without zooming? Button visible above fold? Button large enough to tap with a thumb?", "If hops are low despite good CTR: rewrite the line above the button to add urgency. Rewrite button text to be more specific ('Show me the video &rarr;'). Add social proof under button."], "fb:w2s1t2": ["Good CTR + low hops &rarr; bridge page problem. Rewrite the CTA section with more urgency and a more specific button label.", "Good hops + zero sales &rarr; offer's sales page problem. Test the sales page on your phone. If it's poor on mobile, find a different offer. Duplicate your funnel, swap only the hoplink, duplicate the Ad Set, and compare."], "fb:w2s2t0": ["Open the <b>Ad Tracker</b> tab. Every morning, log yesterday's data from Ads Manager (Spend, Clicks, CTR, CPC) and ClickBank Reporting (Hops, Sales, Revenue).", "Log every day even when there's nothing good to report \u2014 the pattern across slow days shows trends."], "fb:w2s2t1": ["In Ads Manager, use <b>Breakdown &rarr; By Delivery &rarr; Age</b> to find which age group has lowest CPC and highest CTR.", "Use <b>Breakdown &rarr; By Delivery &rarr; Placement</b> to see which placements (Feed, Reels, Stories) perform best. Write findings in Notes."], "fb:w2s2t2": ["Honest check-in in Notes: Total spent | Total earned | Cost per hop | Cost per sale | Best ad CTR | Where is funnel breaking (use Diagnosis Wizard).", "If you're discouraged: most people who eventually succeed were losing money at this exact stage. Month 1 buys data and skill."], "fb:w3s0t0": ["Open Ads Manager &rarr; Ads tab. Sort by CTR highest to lowest. Your <b>control ad</b> = highest CTR + lowest CPC + most hops.", "Screenshot its performance. Document: ad name, exact hook text, image used, CTR, CPC, total spend, hops.", "Turn off any ads with $40+ spend and CTR below 0.8%."], "fb:w3s0t1": ["In Ad Set settings: narrow age range to your best-performing bracket. Switch from Advantage+ to <b>Manual placements</b> \u2014 select only your best-performing placements.", "Safer alternative: duplicate the Ad Set and make changes to the duplicate, preserving the original's learning."], "fb:w3s0t2": ["If you have 50+ pixel link clicks: in Business Manager &rarr; Audiences &rarr; Create Lookalike. Source = your Bridge Page Pixel. Location = United States. Size = 1%.", "Once available (1\u20136 hrs), duplicate your best Ad Set. Add the Lookalike under Custom Audiences. Remove manual age/interest targeting. Budget $10/day."], "fb:w3s0t3": ["Open bridge page in incognito mode. Give yourself 30 seconds: is it obvious what this page is about and what to do? If not, it needs work.", "Test headline, bullet clarity, and CTA specificity. Ask a friend to read it cold. Make final tweaks and republish."], "fb:w3s1t0": ["Open the Ad Tracker. Write: Total spent | Total revenue | Net P&amp;L | Cost per hop | Cost per sale.", "Look at week-over-week trend: is your cost per sale going down? That downward trend \u2014 even while unprofitable \u2014 means you're on the right track."], "fb:w3s1t1": ["If profitable for 3+ consecutive days: <b>duplicate</b> your best Ad Set at 20% higher budget (e.g. $10/day &rarr; $12/day). Never increase an existing Ad Set by more than 20% at a time.", "After 3\u20134 days, if the duplicate performs as well, pause the original and duplicate the new one at 20% higher again. This 'staircase scaling' is slower but far more reliable."], "fb:w3s1t2": ["Use the <b>Diagnosis Wizard</b> to identify your exact bottleneck. Follow the chain: Bad CTR &rarr; fix creative. Good CTR + low hops &rarr; fix bridge page. Good hops + no sales &rarr; fix offer.", "Write a decision point in Notes: 'If I have zero sales after $[X] more spend, I will switch offers.' Commit to this number before spending it."], "fb:w3s1t3": ["Research 2\u20133 backup offers in ClickBank using the Offer Scorecard. Look in adjacent niches: gut health, energy, sleep, hormones.", "For each, generate and save hoplinks. Check affiliate tools pages for email swipes and pre-built landing pages."], "fb:w3s2t0": ["Write your month-end review in Notes: Total spent | Total earned | Net P&amp;L | Number of sales | Best hook | Worst ad | Biggest weak point | What surprised me | What I'd do differently.", "This document is worth more than any course. Reading it at the start of Month 2 saves weeks of re-learning."], "fb:w3s2t1": ["List at least 5 specific mistakes. Common ones: changed ads before $50 spend, picked offer based on commission not sales page quality, didn't log tracker daily, sent traffic direct to ClickBank.", "For each mistake, write one sentence on what you'll do differently in Month 2."], "fb:w3s2t2": ["Write Month 2 Plan with 3 specific, measurable goals with deadlines. Bad: 'run better ads.' Good: 'Test 2 video creatives against best static ad by Day 10 of Month 2.'", "Write the 3 goals at the top of your Month 2 notes. Review them every Monday."], "ms:w0s0t0": ["Go to <b>ads.microsoft.com</b>. Click <b>Sign up now</b>. Use a personal or business Microsoft account (Outlook, Hotmail, or create a new one).", "Fill in your country, time zone, and currency. These cannot be changed after setup \u2014 choose your correct timezone now.", "Enter your business name (can be your own name) and your website URL (use your bridge page URL if available).", "Enter billing information: credit card or bank account. Microsoft requires a payment method before you can run ads.", "You'll land in the Microsoft Advertising dashboard. Explore it briefly \u2014 the interface is similar to Google Ads."], "ms:w0s0t1": ["In Microsoft Advertising, go to <b>Tools &rarr; UET Tag</b> (Universal Event Tracking). Click <b>Create UET tag</b>.", "Name it <b>Bridge Page Tag</b>. Click Save. You'll see a JavaScript code snippet.", "Copy the UET tag code. In your Systeme.io bridge page, go to page settings &rarr; find the <b>Custom Header Code</b> or <b>Tracking Scripts</b> field. Paste the UET tag code there.", "Republish your bridge page. Back in Microsoft Advertising, use the <b>UET Tag Helper</b> Chrome extension (available in Chrome Web Store) to verify the tag fires on your bridge page."], "ms:w0s0t2": ["In Microsoft Advertising, go to <b>Conversion goals &rarr; Create conversion goal</b>.", "Select <b>Destination URL</b> as the goal type. Give it a name: 'ClickBank Conversion'. Enter a URL that contains your ClickBank thank-you page domain (this tracks completed purchases).", "Alternatively, set up an <b>Event</b> conversion goal: someone who clicks your CTA button. This is easier to track with the UET tag on your bridge page.", "Set the conversion value to your average commis
