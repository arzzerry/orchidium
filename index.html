sion amount (e.g. $40)."], "ms:w0s1t0": ["Go to <b>Tools &rarr; Keyword Planner</b> in Microsoft Advertising. Click <b>Find new keywords</b>.", "Enter seed keywords: <i>weight loss, lose weight fast, how to lose belly fat, keto diet plan, weight loss supplement</i>.", "Set targeting to <b>United States</b>. Review monthly search volume, competition level, and suggested bid.", "Export or note keywords with: <b>moderate to high volume, medium competition, and suggested bid under $2.00</b>. These are your starting targets.", "Also check <b>Related keywords</b> \u2014 Microsoft often shows lower-competition variants not found on Google."], "ms:w0s1t1": ["Read Microsoft Advertising's <b>Healthcare and medicines</b> policy at about.ads.microsoft.com/en-us/resources/policies.", "Key rules: no specific weight loss amount claims, no before/after body images in ads, no unsubstantiated health claims, no misleading testimonials.", "Microsoft's weight loss policies are similar to Google's but <b>slightly more lenient</b> \u2014 they allow some supplement advertising that Google restricts. However, your ClickBank offer's sales page must not have misleading claims.", "Verify your chosen ClickBank offer doesn't violate these policies. Look specifically at the sales page copy \u2014 Microsoft will visit your landing page during review.", "Create a checklist: Does the sales page make specific pound claims? Medical claims? Show extreme before/after? If yes to any, find a different offer."], "ms:w0s1t2": ["Your ClickBank bridge page works for Microsoft Ads \u2014 it's the same concept. However, review it against Microsoft's landing page requirements.", "Microsoft requires: clear relevance between ad and landing page, no pop-ups that block content, working privacy policy link, phone number or contact info visible.", "Add a simple <b>Privacy Policy</b> link to your Systeme.io bridge page footer if it doesn't have one. You can use a free privacy policy generator (iubenda.com or privacypolicygenerator.info) to create one.", "Add a simple footer to your bridge page: 'Privacy Policy | Contact: [your email]'. This reduces the chance of ad disapproval."], "ms:w1s0t0": ["In Microsoft Advertising, click <b>+ Create campaign</b>. Select <b>Search</b> as the campaign type.", "Campaign settings: Name it <b>MS-WL-Search-01</b>. Daily budget: <b>$15/day</b> (Microsoft Ads typically needs slightly higher budget than Facebook to gather data).", "Bidding strategy: start with <b>Manual CPC</b> \u2014 gives you full control. You'll switch to Smart Bidding once you have conversion data.", "Location targeting: <b>United States</b>. Language: English. Leave ad schedule at all times for now."], "ms:w1s0t1": ["In your campaign, create <b>two Ad Groups</b> (keeps keywords organized by intent):<br>&bull; <b>AG1-WeightLoss-General:</b> broad intent keywords like 'weight loss tips', 'how to lose weight'<br>&bull; <b>AG2-WeightLoss-Program:</b> higher intent keywords like 'weight loss program', 'best weight loss supplement'", "Add 8\u201312 keywords per ad group. Use these match types:<br>&bull; <b>[Exact match]</b>: [weight loss supplement], [weight loss program]<br>&bull; <b>\"Phrase match\"</b>: \"how to lose weight\", \"belly fat solution\"<br>&bull; Broad match: weight loss tips, lose belly fat fast", "Add initial negative keywords: free, diet recipes, exercise, gym, calories, diabetes (keeps unqualified traffic out)."], "ms:w1s0t2": ["Microsoft Ads uses <b>Responsive Search Ads</b>: write up to 15 headlines (max 30 characters each) and 4 descriptions (max 90 characters each). Microsoft mixes and matches to find the best combinations.", "Write <b>15 unique headlines</b>. Examples:<br>'See Why Nothing Has Worked'<br>'The Real Reason You Can't Lose Weight'<br>'Watch This Free Video Today'<br>'A Surprising Morning Habit'<br>'Women Over 40 Are Raving About This'<br>'Finally Lose the Stubborn Weight'<br>'Simple, No-Diet Approach'<br>'Free Video Shows the Truth'<br>'Thousands of Women Are Doing This'<br>'The Missing Piece You Haven't Tried'", "Write <b>4 descriptions</b> (90 chars each): validate pain, tease the solution, drive curiosity, include a CTA. Example: 'Discover why diets keep failing and what women over 40 are doing instead. Watch the free video.'", "Final URL: <b>your bridge page URL</b>. Display URL path: yourdomain.com/weight-loss-secret"], "ms:w1s0t3": ["Add a comprehensive <b>negative keyword list</b> to your campaign. This prevents wasted spend on irrelevant searches.", "Essential negatives for weight loss ClickBank campaigns: free, cheap, cheap diet, DIY, homemade, recipes, exercise, workout, gym, yoga, running, walking, diabetes, cancer, thyroid, doctor, medical, surgery, liposuction, celebrity, child, teen, teenager, boy, men (if targeting women only), Reddit, YouTube, Wikipedia.", "Add these as <b>Broad Match Negatives</b> at the campaign level. In Microsoft Ads: go to your campaign &rarr; <b>Negative Keywords &rarr; Add</b>.", "Review your Search Term Report after 3 days and add any irrelevant terms you find there as negatives."], "ms:w1s1t0": ["After 48\u201372 hours and at least $30 spent, open your campaign dashboard.", "Check key Microsoft Ads metrics: <b>CTR target for search: 3%+</b> (search ads have much higher intent than Facebook, so CTR expectations are higher). <b>Avg CPC target: $0.50\u2013$1.50</b>.", "In Microsoft Ads, navigate to <b>Keywords</b> tab. Look for keywords with Quality Score below 5 \u2014 these need either ad copy improvement or should be paused.", "Quality Score in Microsoft Ads (1\u201310) measures: <b>Expected CTR + Ad Relevance + Landing Page Experience</b>. Low scores increase your CPCs."], "ms:w1s1t1": ["Open the <b>Search Terms Report</b>: in Microsoft Ads go to Reports &rarr; Search Terms, or find it under Dimensions.", "For each search term that triggered your ads: Is it relevant? Is it something a buyer would search? Add irrelevant terms to your negative keyword list immediately.", "Look for <b>high-intent terms</b> you didn't include as keywords \u2014 add those as Exact Match keywords to their own ad group.", "Eliminate keywords with 50+ clicks and zero conversions (or zero bridge page visits). They're costing money without results."], "ms:w1s1t2": ["In Microsoft Ads, go to your campaign &rarr; <b>Bid Adjustments</b>.", "<b>Device adjustments:</b> Check performance by device. If desktop performs much better than mobile (common on Bing \u2014 older audience), reduce mobile bid by 30\u201350% (set to -30%).", "<b>Location adjustments:</b> Under Demographics, check which US states convert best. Increase bids for top states by 10\u201320%.", "<b>Time of day:</b> Run an Ad Schedule report. If weekday mornings 8\u201311am perform best, increase bids during those hours and reduce during low-performing times."], "ms:w1s2t0": ["<b>Microsoft's unique advantage:</b> LinkedIn Profile Targeting. Available only on Microsoft Advertising. You can target users by their LinkedIn job title, industry, or company size.", "In your campaign &rarr; <b>Demographics &rarr; LinkedIn Profile Targeting</b>: add targeting for 'Healthcare' industry or 'Senior' job titles (these audiences skew older and have disposable income \u2014 aligns well with weight loss offers).", "This is an observation-only layer \u2014 it won't restrict your audience, just tells Microsoft to favor matching LinkedIn profiles."], "ms:w1s2t1": ["Run a <b>full performance review</b> of your first two weeks on Microsoft Ads: Total Spend | Total Revenue | Cost Per Click | Cost Per Hop | Cost Per Sale.", "Compare Microsoft CPC to your Facebook CPC from Month 1. Microsoft Bing clicks typically cost 30\u201350% less than equivalent Facebook clicks but have higher purchase intent because users are actively searching.", "Microsoft Bing's user base: ~39% of US desktop searches, demographic skews 35\u201365 with higher household income vs. Google \u2014 well aligned with weight loss buyers."], "ms:w2s0t0": ["If you have profitable keywords, <b>duplicate the campaign</b> and increase the duplicate's budget by 20%. Keep the original running for comparison.", "Explore the <b>Microsoft Audience Network</b>: go to your campaign &rarr; Settings &rarr; enable Audience Network. This extends your ads to native placements on MSN, Microsoft News, Outlook, and Edge browser. CPCs are much lower but traffic quality varies.", "Set up a <b>separate Audience Network campaign</b> with a $10/day budget to test \u2014 keep it separate from your Search campaign so budgets don't interfere."], "ms:w2s0t1": ["In Microsoft Advertising &rarr; <b>Audience &rarr; Remarketing</b>: create an 'All Bridge Page Visitors' audience based on your UET tag.", "Create a <b>Remarketing Search campaign</b>: target previous bridge page visitors who searched for weight loss keywords again. These users are warm traffic and convert at a higher rate.", "Set remarketing bid adjustment to +50% on your existing campaign (Campaign &rarr; Audiences &rarr; add your remarketing list &rarr; set bid adjustment to +50%)."], "ms:w2s0t2": ["Complete a full month-end analysis for Microsoft Ads: compare performance week-by-week. Is Quality Score improving? Is CPC decreasing? Is conversion rate (bridge page to hoplink) improving?", "Write your Microsoft Month 2 plan in Notes: 3 specific goals with metrics and deadlines. Example: 'Achieve Quality Score of 7+ on all active keywords by Week 2 of Month 2 by improving ad relevance scores.'"], "ig:w0s0t0": ["Instagram ads are managed through the same <b>Meta Ads Manager</b> as Facebook. If you've already set up Business Manager for Facebook, you're already set up for Instagram.", "Confirm your <b>Instagram Business Account</b> is connected to your Facebook Page: go to Business Manager &rarr; Instagram Accounts. If not connected, click Add &rarr; Connect your Instagram account.", "Your existing <b>Meta Pixel</b> works for Instagram ads. No additional setup needed.", "Key difference from Facebook: <b>Instagram is visual-first.</b> Copy matters less; the first 1\u20133 seconds of your visual is everything."], "ig:w0s0t1": ["Instagram ad formats in 2025, ranked by current performance for direct response:<br><b>1. Reels Ads</b> (9:16 video, 15\u201360 sec) \u2014 highest reach and lowest CPM currently<br><b>2. Stories Ads</b> (9:16, image or 15-sec video) \u2014 high swipe-up rates<br><b>3. Feed Ads</b> (1:1 or 4:5 image/video) \u2014 still reliable<br><b>4. Explore Ads</b> \u2014 lower intent but can generate cheap clicks", "For ClickBank weight loss, prioritize: <b>Reels first, Stories second, Feed third.</b>", "Reels ads appear between organic Reels. They must feel like organic content \u2014 not like ads \u2014 to perform well. This is the #1 insight for Instagram."], "ig:w0s0t2": ["Go to <b>facebook.com/ads/library</b>. Set Country to US. Set the <b>Platform filter to Instagram</b> (or search without platform filter and look for Instagram placements).", "Search: <b>weight loss</b>. For each compelling ad, click 'See ad details' to check if it's running on Instagram. Screenshot Instagram-specific ads.", "Look specifically at: Do they use Reels-style video or static images? What does the first frame show? Is there text overlay on the video? What's the 'thumb-stop' element \u2014 why would someone stop scrolling?", "Note: <b>Creator-style content</b> (shot on phone, natural lighting, talking to camera) consistently outperforms polished studio content on Instagram for health/wellness offers."], "ig:w0s1t0": ["For Instagram, your ClickBank offer selection has an additional criterion: <b>the offer must have a compelling visual story.</b> Weight loss offers with transformation messaging (lifestyle transformation \u2014 not body before/after) work best.", "Evaluate your existing offer: Can you tell a visually compelling story about this offer in 30 seconds without using before/after imagery? If yes, it's a good Instagram offer.", "Offers that work well on Instagram: lifestyle-based supplements, programs with a unique angle (morning routine, specific habit), offers where the 'mechanism' is photogenic or interesting visually."], "ig:w0s1t1": ["Plan 3 creative concepts for Reels ads (you'll shoot them in Week 2):<br><b>Concept 1 \u2014 Talking head:</b> You (or someone) speaks directly to camera for 30\u201345 seconds. Hook in first 2 seconds. Most authentic style.<br><b>Concept 2 \u2014 Text overlay montage:</b> Lifestyle footage with bold text overlays. No face required.<br><b>Concept 3 \u2014 'POV' style:</b> Camera-first-person perspective showing a morning routine or habit. Very popular on Reels.", "Each concept needs a <b>hook in the first 1\u20133 seconds</b> that stops someone from swiping. Examples: 'I tried every diet until I found this.' / 'POV: you finally figured out why weight loss wasn't working.' / a startling visual or statement.", "Note: you do NOT need to show your own face. Text-overlay videos and voiceover-style Reels work well for affiliate marketers."], "ig:w1s0t0": ["Create your <b>first Reels ad video</b>. Tools needed: iPhone or Android (portrait mode), decent lighting (near a window is fine), free editing app (CapCut recommended \u2014 free, excellent).", "<b>Video structure for weight loss Reels:</b><br>0\u20132 sec: Hook (visual or verbal \u2014 must create pattern interrupt)<br>2\u20138 sec: Problem acknowledgment ('If you've tried everything and nothing works...')<br>8\u201320 sec: Curiosity/discovery ('There's something most people haven't tried...')<br>20\u201330 sec: Social proof + CTA ('Thousands of women are doing this now. Watch the short video at the link in bio.')", "Shoot in <b>9:16 vertical format</b>. Keep the center 4:5 area free of text (so it displays correctly in Feed too).", "Aim for 30\u201345 seconds total. Under 30 sec = too short for story. Over 60 sec = losing people."], "ig:w1s0t1": ["Create your <b>Stories ad</b>. This is a 9:16 image or 15-second video.", "For a static Stories ad: use Canva (select Instagram Story template 1080&times;1920). Use a compelling lifestyle image, a short hook headline, and a 'Swipe Up' or 'See More' call to action.", "For a video Stories ad: use your Reels video cut to 15 seconds \u2014 keep only the hook and the CTA. Add text overlay at the bottom: 'Watch the full video &rarr;'", "Stories ads have a <b>Swipe Up</b> gesture (now 'See More') that goes directly to your bridge page. This makes them very effective for direct response."], "ig:w1s0t2": ["Create your <b>Feed ad</b>. Use a 1080&times;1080 (square) or 1080&times;1350 (4:5 portrait \u2014 shows larger in feed) format.", "The Feed ad image for Instagram should be more <b>aesthetically polished</b> than your Facebook creative. Instagram users have higher visual standards.", "Use Canva: create a clean lifestyle image composition. Add a minimal text overlay if any \u2014 let the image do the work.", "The Feed ad copy (caption) can be longer on Instagram than on Facebook \u2014 Instagram users actually read captions. Use 2\u20133 paragraphs of the same pain &rarr; curiosity &rarr; CTA structure.", "End captions with: 'Link in bio' or 'Click the link in our profile'. On Instagram, the clickable link is in the bio \u2014 your ad will show a 'Learn More' button that overrides this."], "ig:w1s0t3": ["Review all 3 creative formats against Instagram's ad policies (same as Facebook's Meta policies):<br>&bull; No before/after body images &bull; No specific weight loss claims &bull; No medical claims &bull; No language targeting body image negatively", "Add captions/subtitles to your video ads \u2014 <b>80% of Instagram videos are watched without sound.</b> CapCut has an auto-subtitle feature. Review and correct any errors.", "Export all videos at <b>1080&times;1920, H.264, MP4 format, 30fps</b>. Minimum 15 seconds, maximum 60 seconds for Reels. Keep file size under 250MB."], "ig:w2s0t0": ["In <b>Meta Ads Manager &rarr; + Create</b>. Campaign objective: <b>Traffic</b> (same as Facebook start). Name: <b>IG-WL-Reels-01</b>.", "At the Ad Set level: turn <b>Advantage+ placements OFF</b>. Switch to Manual placements. Select ONLY <b>Instagram Reels</b> for this campaign. You want clean, isolated data on Instagram Reels performance.", "Budget: <b>$10/day</b>. Audience: Women, 35\u201355, United States. Leave interests broad initially."], "ig:w2s0t1": ["At the Ad level, select your Reels video (9:16, 30\u201345 sec). Add your copy in the Primary Text field.", "<b>Instagram-specific copy tips:</b><br>&bull; Hook in the first line (readers see 2 lines before 'more')<br>&bull; Use line breaks for readability<br>&bull; End with 'Click Learn More to watch the full video'<br>&bull; Can use relevant hashtags (5\u201310 max \u2014 not 30 like organic posts)", "Add your <b>bridge page URL</b> in the website URL field. CTA button: Learn More.", "After publishing, create a <b>second campaign for Instagram Stories</b> (same process, select Instagram Stories placement only). And a <b>third for Instagram Feed</b>. Three separate campaigns = isolated, comparable data for each format."], "ig:w2s0t2": ["Instagram-specific metrics to track (different from Facebook):<br><b>ThruPlay</b>: percentage who watch to end (or 15+ seconds). Target: 8%+ = strong creative<br><b>3-Second Video View Rate</b>: percentage who watch at least 3 seconds. Target: 25%+ = strong hook<br><b>Video Average Play Time</b>: how long people watch on average<br><b>CTR (Link Click-Through Rate)</b>: same as Facebook target (1%+)", "Low 3-second view rate (&lt;15%) = your hook isn't stopping the scroll. Reshoot the first 2 seconds.", "High 3-second view rate but low ThruPlay = good hook but the middle content loses people. Make the middle more compelling."], "ig:w2s0t3": ["After 7 days, compare your 3 format campaigns: Which has the best CTR? Which has the lowest CPC? Which drives the most hops to the ClickBank offer?", "Instagram Reels consistently shows the lowest CPM (cost per 1000 impressions) \u2014 but the format that drives the most <b>qualified traffic to your bridge page</b> is what matters, regardless of CPM.", "Pause the worst-performing format campaign. Allocate its budget to the best-performing format."], "ig:w3s0t0": ["With your best format identified, create <b>2 new creative variations</b> for that format:<br>&bull; Variation A: Different hook (if you used talking-head, try text-overlay instead)<br>&bull; Variation B: Different angle on same emotional theme (if pain-based, try curiosity-based)", "Keep all other variables the same (targeting, budget, bridge page URL). Give each variation 5\u20137 days."], "ig:w3s0t1": ["Set up <b>Instagram Video Viewer Retargeting</b>: In Ads Manager, go to Audiences &rarr; Create &rarr; Custom Audience &rarr; Video.", "Select your Reels ad video. Choose 'People who watched at least 25% of your video.' Name it: 'IG Reel 25% Viewers'.", "Create a second audience: 'People who watched at least 75%' \u2014 these are your most interested viewers.", "Create a retargeting campaign targeting the 75% viewers with a more direct offer-focused message and your bridge page URL."], "ig:w3s0t2": ["Full Instagram month review: Total spend | Revenue | Cost per hop | Best performing format | Best performing hook | ThruPlay % on best video.", "Instagram Month 2 plan: Create 2 new Reels using creator-style (face-to-camera) if you've only used text-overlay so far, or vice versa. Creator-style content typically produces higher engagement rates."], "ga:w0s0t0": ["Go to <b>ads.google.com</b>. Click <b>Start now</b>. Sign in with a Google account (use a dedicated Gmail for your ads business \u2014 not personal email).", "Google will try to create a Smart Campaign automatically. <b>Click 'Switch to Expert Mode'</b> at the bottom of the screen. Smart Campaigns have very limited control \u2014 you need Expert Mode.", "In Expert Mode, select <b>Create a campaign without a goal's guidance</b> (gives you full control). For now, just complete account setup without creating a campaign.", "Enter your billing information. Select your country, timezone, and currency carefully \u2014 these cannot be changed."], "ga:w0s0t1": ["<b>Critical first step:</b> Read Google's <b>Healthcare and Medicines policy</b> at policies.google.com/technologies/ads. This is the most restrictive ad platform for weight loss.", "Key Google restrictions for weight loss:<br>&bull; Cannot make specific weight loss claims ('lose 30 lbs in 30 days')<br>&bull; Cannot show before/after images in ads<br>&bull; Weight loss supplement ads <b>require Google certification</b> in some cases<br>&bull; Personalized advertising is restricted for health and wellness<br>&bull; Cannot imply medical treatment or diagnosis", "<b>The good news:</b> You CAN advertise educational content about weight loss, lifestyle approaches, and 'programs' that don't make extreme claims. Your bridge page + a compliant ClickBank offer is the right approach.", "<b>Practical rule:</b> If your ad and landing page look like they belong in a health magazine (informational, not hypey), you'll likely pass review. If they look like late-night infomercials, expect disapproval."], "ga:w0s0t2": ["Evaluate your ClickBank offer specifically for Google compliance \u2014 this is stricter than your Facebook evaluation.", "Google's automated systems AND human reviewers will visit your bridge page and the destination (ClickBank sales page).", "<b>Your bridge page must:</b> Load quickly (&lt;3 sec), have a working privacy policy link, not have pop-ups blocking content, have no misleading claims, match the topic of your ad.", "<b>The ClickBank sales page must:</b> Not make specific pound claims, not show before/after images, have a real money-back guarantee clearly stated (actually helps with Google), have real contact information.", "If your current offer's sales page is highly hypey, consider choosing a different ClickBank offer for Google \u2014 one with a more professional, less aggressive sales page. Browse ClickBank Health & Fitness and look for offers with cleaner, more editorial-style sales pages."], "ga:w0s1t0": ["In Google Ads, go to <b>Tools &amp; Settings &rarr; Planning &rarr; Keyword Planner</b>.", "Click <b>Discover new keywords</b>. Enter seed keywords: <i>weight loss program, how to lose belly fat, weight loss supplement, best diet for women over 40, how to speed up metabolism</i>.", "Filter results: Monthly searches minimum 1,000. Competition: Medium (avoid High for now \u2014 too expensive). Top of page bid (low range): ideally under $2.00.", "Create a keyword list organized by intent:<br><b>High intent (buy-ready):</b> 'weight loss program', 'weight loss supplement that works'<br><b>Research intent:</b> 'how to lose weight fast', 'best weight loss method'<br><b>Problem-aware:</b> 'why can't I lose weight', 'belly fat won't go away'", "Start with high-intent and problem-aware keywords \u2014 research intent users often aren't ready to buy."], "ga:w0s1t1": ["Set up <b>Google Tag Manager (GTM)</b> \u2014 this makes adding conversion tracking and other tags much easier than editing HTML directly.", "Go to <b>tagmanager.google.com</b>. Create a new account. Create a Container for your website.", "GTM will give you two code snippets. In Systeme.io, add them to your bridge page's custom header/body code areas exactly as instructed.", "Verify GTM is installed: use the GTM Preview mode (click Preview in GTM dashboard, enter your bridge page URL). You should see GTM connected in the preview bar."], "ga:w0s1t2": ["In Google Ads &rarr; <b>Tools &amp; Settings &rarr; Measurement &rarr; Conversions</b>. Click <b>+ New conversion action</b>.", "Select <b>Website</b> as the conversion source. Enter your bridge page URL as the domain.", "Select <b>Other</b> as the category. Name it: 'Bridge Page CTA Click'. Set value to your average commission (e.g. $40).", "For the conversion tag: choose <b>Use Google Tag Manager</b>. Google will give you a Conversion ID and Conversion Label. In GTM, create a new tag: Google Ads Conversion Tracking, paste in the ID and Label. Set trigger to 'Click - CTA Button' (create a trigger for clicks on your CTA button URL).", "Verify the conversion is tracking using GTM Preview and a test click on your bridge page."], "ga:w1s0t0": ["In Google Ads, create a <b>Search campaign</b> in Expert Mode.", "Campaign name: <b>GA-WL-Search-01</b>. Campaign type: Search. Goal: select 'Website traffic' (or create without goal).", "Bidding strategy: Start with <b>Manual CPC</b> with Enhanced CPC enabled. You'll switch to Target CPA once you have 30+ conversions. Daily budget: <b>$15\u201320/day</b> (Google needs more data volume than Facebook to optimize).", "Networks: <b>Uncheck 'Include Google Search Partners'</b> and <b>uncheck 'Include Google Display Network'</b> initially. Pure Google Search only gives the cleanest data.", "Location: United States. Language: English. Ad Schedule: All day initially."], "ga:w1s0t1": ["Create your <b>campaign structure</b>: 2\u20133 ad groups organized by keyword theme.", "<b>Ad Group 1 \u2014 Problem Aware:</b> Keywords like [why can't i lose weight], [belly fat won't go away], [tried everything to lose weight]", "<b>Ad Group 2 \u2014 Solution Seeking:</b> Keywords like [weight loss program], [weight loss supplement women], [best way to lose weight over 40]", "<b>Ad Group 3 \u2014 Discovery:</b> Keywords like [how to lose weight fast], [weight loss tips women 40]", "Keep each ad group tightly themed \u2014 all keywords should share the same user intent. This improves ad relevance and Quality Score.", "Use a mix of Exact Match [keyword] and Phrase Match \"keyword\" per ad group. Start with 5\u20138 keywords per group."], "ga:w1s0t2": ["Google uses <b>Responsive Search Ads (RSAs)</b>: write 15 headlines (max 30 characters each) and 4 descriptions (max 90 characters each). Google tests combinations automatically.", "Write 15 headlines. At least 3 should include your main keyword (for ad relevance). Examples:<br>'Weight Loss Tips For Women'<br>'Finally Lose The Stubborn Weight'<br>'See Why Diets Keep Failing'<br>'Watch The Free Video Today'<br>'A Surprising New Approach'<br>'Women Over 40 Are Loving This'<br>'The Missing Piece You Need'<br>'Simple And Surprisingly Effective'<br>'No Extreme Diets Required'<br>'Thousands Already Watching This'<br>'Discover What Really Works'<br>'Free Video \u2014 Limited Time'<br>'Weight Loss That Makes Sense'<br>'What Doctors Don't Tell You'<br>'Start Your Journey Today'", "4 descriptions (90 chars): Include pain acknowledgment, tease the solution, add social proof, and a clear CTA. <b>Do not make specific claims</b> \u2014 keep it curiosity-based.", "Final URL: <b>your bridge page URL</b>. Display path: yourdomain.com/weight-loss"], "ga:w1s0t3": ["Google Search negative keywords are <b>critical</b> \u2014 without them you waste enormous spend on irrelevant searches.", "<b>Essential negative keywords for weight loss ClickBank campaigns:</b><br>free, cheap, DIY, homemade, recipe, workout, exercise, gym, yoga, running, walking, cycling, surgery, liposuction, bariatric, prescription, medication, ozempic, wegovy, phentermine, diabetes, thyroid, PCOS, keto recipe, diet recipe, calories, macro, teenager, child, kids, men (if women-only), Reddit, YouTube, Wikipedia, Amazon, Walmart", "Add as <b>Broad Match Negatives</b> at the campaign level. In Google Ads: Keywords &rarr; Negative Keywords &rarr; Add to campaign.", "Also download Google's Search Terms Report after 3 days and add all irrelevant actual search terms as exact-match negatives."], "ga:w2s0t0": ["<b>Quality Score</b> is Google's rating (1\u201310) of ad relevance and landing page quality. Higher scores = lower CPCs and better ad positions.", "Check Quality Scores: in Google Ads, go to Keywords tab &rarr; click the speech bubble icon next to any keyword to see its Quality Score breakdown.", "Three components:<br><b>Expected CTR:</b> How often your ad is expected to be clicked (improve with compelling headlines)<br><b>Ad Relevance:</b> How closely your ad matches the keyword intent (include the keyword in at least 1 headline)<br><b>Landing Page Experience:</b> How relevant and useful your bridge page is (improve with relevant content, fast load, clear navigation)", "Target: Quality Score 7+ on all active keywords. Below 5 = pause the keyword or rewrite your ad for that theme."], "ga:w2s0t1": ["Google's landing page requirements are strict. Your bridge page needs to pass several checks.", "<b>Speed:</b> Use Google's PageSpeed Insights (pagespeed.web.dev) to test your bridge page. Target score: 70+ on mobile. If below, your Systeme.io page may need image optimization.", "<b>Relevance:</b> The content on your bridge page must closely match the keywords in your ad. If your ad talks about 'weight loss for women over 40', your bridge page headline should reflect that.", "<b>Transparency:</b> Must have a visible privacy policy, a way to contact you, and no misleading claims.", "<b>Pop-ups:</b> Interstitials and pop-ups that cover content = immediate landing page penalty. Make sure your Systeme.io page has no exit pop-ups."], "ga:w2s0t2": ["Run the <b>Search Terms Report</b> daily in Week 3: Google Ads &rarr; Keywords &rarr; Search Terms.", "For each search term: Is this relevant to your offer? Would this person buy? Add irrelevant terms as negative keywords immediately.", "Look for <b>high-intent search terms</b> you haven't targeted as keywords. Add these as Exact Match in a new ad group tailored to that intent.", "Create a 'Search Term Mining' session every 2 days \u2014 spend 15 minutes reviewing new search terms and updating negatives. This is the highest-ROI optimization activity in Google Ads."], "ga:w2s0t3": ["After accumulating data, apply <b>bid adjustments</b> to improve efficiency:<br><b>Device:</b> If desktop converts better than mobile (common for weight loss supplement buyers browsing on desktop), reduce mobile bid by 20\u201340%<br><b>Location:</b> States with more conversions get +10\u201320% bid boost<br><b>Hour of day:</b> Identify peak conversion hours (typically 9am\u201312pm and 7pm\u20139pm local time) and increase bids during those windows<br><b>Day of week:</b> Weekdays typically outperform weekends for supplement buyers", "Apply these under Campaign &rarr; Settings &rarr; Bid Adjustments in Google Ads."], "ga:w3s0t0": ["With conversion data building up (aim for 20+ conversions before switching), consider moving from Manual CPC to <b>Target CPA bidding</b>.", "In Google Ads: Campaign &rarr; Settings &rarr; Bidding &rarr; Change bid strategy &rarr; Target CPA.", "Set your Target CPA to your actual average CPA from the last 30 days (total spend &divide; total conversions). Google will automatically adjust bids to try to hit this cost per acquisition.", "<b>Warning:</b> Do not switch to Smart Bidding too early (under 20 conversions). Without enough data, the algorithm will perform poorly."], "ga:w3s0t1": ["<b>Performance Max (PMax)</b> is Google's AI-driven campaign type that runs across all Google channels: Search, Display, YouTube, Gmail, Discover, Maps.", "For ClickBank affiliates, PMax can be powerful but requires: 20+ conversions in your account history, a strong asset group (images, videos, headlines, descriptions), and a clear conversion goal.", "If you have sufficient conversion data, test a small PMax campaign ($10/day) alongside your Search campaign. Use your Reels video from Instagram as the video asset.", "<b>Important:</b> PMax can generate significant spend quickly. Set a strict daily budget cap and monitor it daily for the first week."], "ga:w3s0t2": ["Complete Google Ads month-end analysis: Total spend | Revenue | Cost per click | Quality Score average | Top converting keywords | Wasted spend on negated terms.", "Calculate your <b>Return on Ad Spend (ROAS)</b>: Total Commission Revenue &divide; Total Ad Spend. If ROAS is above 1.0 (you earn more than you spend), you're profitable.", "Google Ads Month 2 plan: Write 3 specific goals. Example: 'Achieve average Quality Score of 7+ across all ad groups by Day 15 by rewriting all headlines to include exact-match keywords.'"]}</script>
<script id="COURSES" type="application/json">[{"id": "fb", "label": "Facebook Ads", "icon": "\ud83d\udcd8", "gradient": "linear-gradient(135deg,#1877F2 0%,#42B0FF 100%)", "color": "#1877F2", "desc": "ClickBank weight loss offers via Facebook & Messenger feed traffic", "weeks": [{"id": 0, "label": "Week 1", "title": "Setup, Offer Selection & Bridge Page", "goal": "Get everything in place before spending a cent on ads.", "color": "#3B82F6", "tabs": ["Course", "Offer Scorecard", "Notes"], "secs": [{"label": "Days 1\u20132 \u00b7 Accounts & Research", "items": [{"day": "Day 1", "text": "Create your <strong>ClickBank account</strong> at clickbank.com. Verify email and fill in payment info \u2014 required before commissions can be paid.", "time": "~20 min", "id": "fb:w0s0t0"}, {"day": "Day 1", "text": "Create a <strong>Facebook Business Manager</strong> at business.facebook.com using your real name. Set up one Ad Account inside it.", "time": "~30 min", "id": "fb:w0s0t1"}, {"day": "Day 1", "text": "Create a free account at <strong>Systeme.io</strong> \u2014 this is where you'll build your bridge page.", "time": "~10 min", "id": "fb:w0s0t2"}, {"day": "Day 2", "text": "Go to <strong>ClickBank Marketplace \u2192 Health & Fitness</strong>. Sort by Gravity. Study 10\u201315 offers: Gravity, Avg $/conversion, and view each sales page on mobile.", "time": "~2\u20133 hrs", "id": "fb:w0s0t3"}, {"day": "Day 2", "text": "<strong>Pick ONE offer:</strong> Gravity 30\u201380, Avg $/conv $35+, mobile-friendly sales page, clear transformation promise, no medical claims.", "time": "~30 min", "id": "fb:w0s0t4"}], "warn": "Facebook policy: Avoid offers with specific weight loss claims, medical language, or before/after photos. These get your account flagged immediately."}, {"label": "Days 3\u20135 \u00b7 Bridge Page", "items": [{"day": "Day 3", "text": "Study your offer's sales page for 1 hour. Note: the core problem it solves, the emotional triggers, key claims, and the exact words your audience uses.", "time": "~1 hr", "id": "fb:w0s1t0"}, {"day": "Day 3", "text": "In Systeme.io, create a new funnel with a single blank landing page. Your bridge page needs: headline, 3\u20135 bullets, one CTA button.", "time": "~30 min", "id": "fb:w0s1t1"}, {"day": "Day 4", "text": "Write your <strong>headline</strong> \u2014 a relatable curiosity hook. Example: \"Why I stopped counting calories and finally lost 18 lbs\"", "time": "~1 hr", "id": "fb:w0s1t2"}, {"day": "Day 4", "text": "Write <strong>3\u20135 curiosity bullets</strong> and a CTA button labeled \"Watch the short video \u2192\". Add 'Free video \u2014 no credit card required' below the button.", "time": "~1 hr", "id": "fb:w0s1t3"}, {"day": "Day 5", "text": "Connect your affiliate link to the CTA button. Preview on mobile. Confirm fast load and button visible above fold. <strong>Publish it.</strong>", "time": "~30 min", "id": "fb:w0s1t4"}]}, {"label": "Days 6\u20137 \u00b7 Pixel Setup", "items": [{"day": "Day 6", "text": "Create a <strong>Meta Pixel</strong> in Events Manager. Copy the Pixel ID (15\u201316 digit number only).", "time": "~30 min", "id": "fb:w0s2t0"}, {"day": "Day 6", "text": "Paste your Pixel ID into Systeme.io's Facebook Pixel ID field in page settings. Save and republish.", "time": "~10 min", "id": "fb:w0s2t1"}, {"day": "Day 7", "text": "Install <strong>Meta Pixel Helper</strong> Chrome extension. Confirm pixel fires green on your bridge page.", "time": "~20 min", "id": "fb:w0s2t2"}, {"day": "Day 7", "text": "Final check: all accounts active, bridge page live, pixel firing, Ad Account has payment method. Save all key URLs and IDs in one document.", "time": "~15 min", "id": "fb:w0s2t3"}], "succ": "ClickBank account set up, offer chosen, bridge page live, pixel firing. Zero ad spend so far."}]}, {"id": 1, "label": "Week 2", "title": "Ad Creatives & First Campaign Launch", "goal": "Create your creatives, launch your first test, and start collecting real data.", "color": "#22C55E", "tabs": ["Course", "Ad Policy Checker", "Notes"], "secs": [{"label": "Days 8\u201310 \u00b7 Ad Creative", "items": [{"day": "Day 8", "text": "Spend a full day in <strong>Facebook Ad Library</strong>. Search weight loss competitors. Study 10\u201315 ads \u2014 hooks, images, formats, CTAs.", "time": "~4 hrs", "id": "fb:w1s0t0"}, {"day": "Day 9", "text": "Write <strong>3 different hooks</strong>: one Pain, one Curiosity, one Social Proof. Cross out anything with specific claims or medical language.", "time": "~2 hrs", "id": "fb:w1s0t1"}, {"day": "Day 9", "text": "Write 3-paragraph body copy for each hook: Pain/Empathy \u2192 Curiosity/Pivot \u2192 CTA. Drive to bridge page, not ClickBank directly.", "time": "~2 hrs", "id": "fb:w1s0t2"}, {"day": "Day 10", "text": "Create 3 ad images in <strong>Canva (free)</strong>: lifestyle photos only. No before/after, no scales, no measuring tapes, no pills prominently shown.", "time": "~2 hrs", "id": "fb:w1s0t3"}], "warn": "Never use before/after images. Never mention specific pound amounts. These = ad rejected or account disabled. When in doubt, leave it out."}, {"label": "Days 11\u201312 \u00b7 Campaign Setup", "items": [{"day": "Day 11", "text": "Create campaign: objective = <strong>Traffic</strong>, name = WT-Test-01, CBO off. Then create one Ad Set: Women 35\u201358, United States, broad targeting, $10/day.", "time": "~30 min", "id": "fb:w1s1t0"}, {"day": "Day 11", "text": "Set Ad Set targeting: Women 35\u201358, US, broad (no detailed interests), Advantage+ placements, $10/day.", "time": "~20 min", "id": "fb:w1s1t1"}, {"day": "Day 12", "text": "Create <strong>3 ads</strong> \u2014 one per hook. Same image, different copy. Destination: <strong>your bridge page URL</strong> (never the ClickBank hoplink directly).", "time": "~30 min", "id": "fb:w1s1t2"}, {"day": "Day 12", "text": "Run the pre-publish checklist then hit <strong>Publish.</strong> Ads go into review (1\u201324 hrs). Do not edit anything while in review.", "time": "~15 min", "id": "fb:w1s1t3"}]}, {"label": "Days 13\u201314 \u00b7 Watch & Wait", "items": [{"day": "Day 13", "text": "Ads are live. <strong>Do not touch anything for 48 hours.</strong> The algorithm needs to learn. Panic-editing is the #1 beginner mistake.", "time": "~0 min", "id": "fb:w1s2t0"}, {"day": "Day 13", "text": "Set up Ads Manager columns: CTR (Link), CPC (Link Click), Link Clicks, Amount Spent. Save as preset <strong>Daily Review</strong>.", "time": "~15 min", "id": "fb:w1s2t1"}, {"day": "Day 14", "text": "After 48 hrs and $20+ spent: note CTR and CPC for each ad. Document \u2014 don't decide yet.", "time": "~30 min", "id": "fb:w1s2t2"}], "succ": "First campaign live with 3 ad variations. $70\u2013$100 spent. Real data flowing. No panicked changes made."}]}, {"id": 2, "label": "Week 3", "title": "Read Data, Optimize & Track Sales", "goal": "Make your first data-driven decisions and chase your first sale.", "color": "#F59E0B", "tabs": ["Course", "Ad Tracker", "Diagnosis Wizard", "Notes"], "secs": [{"label": "Days 15\u201316 \u00b7 Reading Your Data", "items": [{"day": "Day 15", "text": "With $100+ spent, compare all 3 ads on <strong>CTR</strong> and <strong>CPC</strong>. Targets: CTR 1%+, CPC under $1.50.", "time": "~30 min", "id": "fb:w2s0t0"}, {"day": "Day 15", "text": "Identify your <strong>worst performer</strong> (lowest CTR, highest CPC). Turn it off.", "time": "~5 min", "id": "fb:w2s0t1"}, {"day": "Day 15", "text": "Identify your <strong>best performer</strong>. Analyze what made that hook work \u2014 use this insight for your next ads.", "time": "~30 min", "id": "fb:w2s0t2"}, {"day": "Day 16", "text": "Log into <strong>ClickBank \u2192 Reporting</strong>. Check Hops vs. Orders. Calculate conversion rate. Even 1\u20132 sales at this stage is a strong signal.", "time": "~15 min", "id": "fb:w2s0t3"}], "metrics": [{"value": "1%+", "label": "Target CTR"}, {"value": "<$1.50", "label": "Target CPC"}, {"value": "1\u20133%", "label": "Offer conv."}]}, {"label": "Days 17\u201318 \u00b7 Optimize", "items": [{"day": "Day 17", "text": "Create <strong>2 new ad variations</strong> from your best hook \u2014 one more specific (add demographic detail), one with a different emotional entry point.", "time": "~2 hrs", "id": "fb:w2s1t0"}, {"day": "Day 17", "text": "Review bridge page on mobile: load time under 3 sec, CTA above fold, readable headline, large enough tap target on button.", "time": "~1 hr", "id": "fb:w2s1t1"}, {"day": "Day 18", "text": "Use the diagnostic chain: good CTR + low hops \u2192 fix bridge page CTA. Good hops + no sales \u2192 test a different offer.", "time": "~1 hr", "id": "fb:w2s1t2"}], "warn": "Budget check: By Week 3 you've likely spent $200\u2013$250. If you're at $400 with zero sales, pause and reassess your offer before spending more."}, {"label": "Days 19\u201321 \u00b7 Track & Document", "items": [{"day": "Day 19", "text": "Open the <strong>Ad Tracker tab</strong>. Log yesterday's Ads Manager + ClickBank data daily without fail.", "time": "~15 min/day", "id": "fb:w2s2t0"}, {"day": "Day 20", "text": "Use Ads Manager Breakdown by Age and Placement. Note your best-performing demographic and placements for Week 4.", "time": "~30 min", "id": "fb:w2s2t1"}, {"day": "Day 21", "text": "<strong>Honest check-in:</strong> Total spent, revenue, cost per hop, cost per sale. Use the Diagnosis Wizard if stuck on where your funnel is breaking.", "time": "~30 min", "id": "fb:w2s2t2"}], "succ": "Cut losing ads, new variations live, tracker running daily. You know exactly where your funnel is breaking."}]}, {"id": 3, "label": "Week 4", "title": "Consolidate, Refine & Plan Month 2", "goal": "Lock in what works and set yourself up to scale profitably.", "color": "#A855F7", "tabs": ["Course", "Ad Tracker", "Notes"], "secs": [{"label": "Days 22\u201324 \u00b7 Tighten & Refine", "items": [{"day": "Day 22", "text": "Identify your <strong>single best ad</strong> (CTR + CPC + hops). This is your control \u2014 every future creative is benchmarked against it.", "time": "~30 min", "id": "fb:w3s0t0"}, {"day": "Day 22", "text": "Refine targeting: narrow age range to your best performers. Switch to Manual placements with only top-performing slots.", "time": "~30 min", "id": "fb:w3s0t1"}, {"day": "Day 23", "text": "Test a <strong>1% Lookalike Audience</strong> from your Bridge Page Pixel (need 50+ clicks first). Run at $10/day in a new Ad Set.", "time": "~20 min", "id": "fb:w3s0t2"}, {"day": "Day 24", "text": "Final bridge page review in incognito: 30-second clarity test, headline check, bullet quality, CTA specificity.", "time": "~1 hr", "id": "fb:w3s0t3"}]}, {"label": "Days 25\u201327 \u00b7 Scale Decisions", "items": [{"day": "Day 25", "text": "Full P&L: Total spend vs. commissions. Calculate cost per hop and cost per sale. Look at week-over-week trend.", "time": "~30 min", "id": "fb:w3s1t0"}, {"day": "Day 26", "text": "If profitable 3+ consecutive days: <strong>duplicate</strong> best Ad Set at 20% higher budget. Never edit the original's budget directly.", "time": "~10 min", "id": "fb:w3s1t1"}, {"day": "Day 26", "text": "Use the <strong>Diagnosis Wizard</strong> to identify your bottleneck. Set a written spend decision point before investing more.", "time": "~15 min", "id": "fb:w3s1t2"}, {"day": "Day 27", "text": "Research 2\u20133 backup ClickBank offers using the Offer Scorecard. Save hoplinks so you can pivot quickly.", "time": "~2 hrs", "id": "fb:w3s1t3"}]}, {"label": "Days 28\u201330 \u00b7 Review & Plan", "items": [{"day": "Day 28", "text": "Write your <strong>month-end review</strong> in Notes: total spent, earned, best hook, biggest weak point, what surprised you.", "time": "~1 hr", "id": "fb:w3s2t0"}, {"day": "Day 29", "text": "List at least <strong>5 specific mistakes</strong> you made and what you'll do differently in Month 2.", "time": "~30 min", "id": "fb:w3s2t1"}, {"day": "Day 30", "text": "Write Month 2 Plan with <strong>3 specific measurable goals</strong> with deadlines. Not 'run better ads' \u2014 specific, actionable, timed.", "time": "~30 min", "id": "fb:w3s2t2"}], "succ": "You know your numbers, your best ad, your funnel's weak point. You have a month-end doc and a concrete Month 2 plan."}]}]}, {"id": "ms", "label": "Microsoft Ads", "icon": "\ud83e\ude9f", "gradient": "linear-gradient(135deg,#00A4EF 0%,#00CC6A 100%)", "color": "#00A4EF", "desc": "ClickBank weight loss offers via Bing search \u2014 lower CPC, higher-income audience", "weeks": [{"id": 0, "label": "Week 1", "title": "Account Setup & Keyword Research", "goal": "Get your Microsoft Advertising account live and identify profitable keywords.", "color": "#00A4EF", "tabs": ["Course", "Offer Scorecard", "Notes"], "secs": [{"label": "Days 1\u20133 \u00b7 Account & Tracking", "items": [{"day": "Day 1", "text": "Create your <strong>Microsoft Advertising account</strong> at ads.microsoft.com. Complete billing setup. Use Expert Mode.", "time": "~30 min", "id": "ms:w0s0t0"}, {"day": "Day 2", "text": "Install your <strong>UET (Universal Event Tracking) tag</strong> on your bridge page via Systeme.io custom header code.", "time": "~30 min", "id": "ms:w0s0t1"}, {"day": "Day 3", "text": "Create a <strong>Conversion Goal</strong> in Microsoft Advertising for bridge page CTA clicks. Set value to your average commission amount.", "time": "~30 min", "id": "ms:w0s0t2"}]}, {"label": "Days 4\u20135 \u00b7 Keyword Research", "items": [{"day": "Day 4", "text": "Use <strong>Microsoft Keyword Planner</strong> (Tools \u2192 Keyword Planner) to find weight loss keywords with moderate competition and under $2.00 suggested CPC.", "time": "~2 hrs", "id": "ms:w0s1t0"}, {"day": "Day 5", "text": "Read Microsoft's <strong>Healthcare and Medicines policy</strong>. Verify your ClickBank offer and bridge page comply. Add a Privacy Policy link to your bridge page footer.", "time": "~2 hrs", "id": "ms:w0s1t1"}, {"day": "Day 5", "text": "Review your bridge page against <strong>Microsoft's landing page requirements</strong>: fast load, no deceptive pop-ups, privacy policy visible, contact info present.", "time": "~1 hr", "id": "ms:w0s1t2"}], "warn": "Microsoft Ads policies are similar to Google's. Your ClickBank offer's sales page will be reviewed \u2014 avoid offers with extreme claims or aggressive before/after imagery."}]}, {"id": 1, "label": "Week 2", "title": "Campaign Creation & Launch", "goal": "Build your first Microsoft Search campaign and launch with controlled spend.", "color": "#22C55E", "tabs": ["Course", "Ad Policy Checker", "Notes"], "secs": [{"label": "Days 8\u201310 \u00b7 Campaign Build", "items": [{"day": "Day 8", "text": "Create a <strong>Search campaign</strong> named MS-WL-Search-01. Start with Manual CPC bidding. Budget $15/day. US English only.", "time": "~30 min", "id": "ms:w1s0t0"}, {"day": "Day 9", "text": "Build <strong>2 Ad Groups</strong> organized by keyword intent: General (broad awareness keywords) and Program (higher-intent purchase keywords). Add 8\u201312 keywords per group plus a comprehensive negative keyword list.", "time": "~2 hrs", "id": "ms:w1s0t1"}, {"day": "Day 10", "text": "Write <strong>Responsive Search Ads</strong>: 15 unique headlines (30 chars max) and 4 descriptions (90 chars max). Include keywords in at least 3 headlines. Keep all copy claim-free.", "time": "~2 hrs", "id": "ms:w1s0t2"}, {"day": "Day 10", "text": "Add a comprehensive <strong>negative keyword list</strong> to prevent wasted spend: free, recipe, exercise, gym, surgery, diabetes, teenager, and 20+ more irrelevant terms.", "time": "~1 hr", "id": "ms:w1s0t3"}]}, {"label": "Days 11\u201314 \u00b7 Launch & Early Data", "items": [{"day": "Day 11", "text": "Publish your campaign. After 48\u201372 hours, check Microsoft Ads metrics: target <strong>CTR 3%+</strong> (search ads have higher intent), <strong>CPC $0.50\u2013$1.50</strong>, Quality Score 6+.", "time": "~30 min", "id": "ms:w1s1t0"}, {"day": "Day 13", "text": "Open the <strong>Search Terms Report</strong>. Add irrelevant search terms as negative keywords. Identify high-intent terms not yet in your keyword list and add them.", "time": "~1 hr", "id": "ms:w1s1t1"}, {"day": "Day 14", "text": "Apply <strong>bid adjustments</strong> by device, location, and time of day based on early performance data. Microsoft Bing skews desktop \u2014 often worth reducing mobile bids 20\u201330%.", "time": "~1 hr", "id": "ms:w1s1t2"}], "succ": "Microsoft campaign live with RSAs running. First Search Term Report analyzed. Quality Scores reviewed and initial bid adjustments applied."}]}, {"id": 2, "label": "Week 3", "title": "Optimize & LinkedIn Targeting", "goal": "Improve Quality Scores, refine audience, and leverage Microsoft's unique LinkedIn targeting.", "color": "#F59E0B", "tabs": ["Course", "Ad Tracker", "Diagnosis Wizard", "Notes"], "secs": [{"label": "Days 15\u201319 \u00b7 Optimization", "items": [{"day": "Day 15", "text": "<strong>LinkedIn Profile Targeting</strong>: enable in campaign Demographics. Target by industry (Healthcare, Wellness) or job seniority (Senior, Manager). Unique to Microsoft Advertising.", "time": "~30 min", "id": "ms:w2s0t0"}, {"day": "Day 16", "text": "Run a full performance review: Spend | Revenue | CPC | Hops | Sales. Compare Microsoft CPC to Facebook CPC \u2014 Microsoft typically 30\u201350% cheaper for equivalent traffic.", "time": "~1 hr", "id": "ms:w2s0t1"}, {"day": "Day 19", "text": "Log into the <strong>Ad Tracker</strong> daily. Microsoft Ads results are often slower to build than Facebook \u2014 you need 3\u20134 weeks of data for meaningful optimization.", "time": "~15 min/day", "id": "ms:w2s2t0"}]}, {"label": "Days 20\u201321 \u00b7 Weekly Review", "items": [{"day": "Day 21", "text": "Honest check-in: which keywords are driving hops? What is your cost per hop vs. Facebook cost per hop? Are Microsoft visitors converting at a different rate on the ClickBank sales page?", "time": "~30 min", "id": "ms:w2s2t1"}]}]}, {"id": 3, "label": "Week 4", "title": "Scale & Microsoft Audience Network", "goal": "Scale profitable campaigns and explore Microsoft's native display network.", "color": "#A855F7", "tabs": ["Course", "Ad Tracker", "Notes"], "secs": [{"label": "Days 22\u201327 \u00b7 Scale & Expand", "items": [{"day": "Day 22", "text": "If profitable: <strong>duplicate your best campaign</strong> at 20% higher budget. Explore the <strong>Microsoft Audience Network</strong> for native display ads across MSN, Edge, Outlook, and Microsoft News.", "time": "~1 hr", "id": "ms:w3s0t0"}, {"day": "Day 24", "text": "Set up <strong>Remarketing</strong> in Microsoft Ads. Create an 'All Bridge Page Visitors' audience from your UET tag. Add it to your search campaign with a +50% bid adjustment.", "time": "~1 hr", "id": "ms:w3s0t1"}, {"day": "Day 27", "text": "Full Microsoft month review: QS average, CPC trend, ROAS. Write Month 2 plan with 3 measurable goals.", "time": "~1 hr", "id": "ms:w3s0t2"}]}]}]}, {"id": "ig", "label": "Instagram Ads", "icon": "\ud83d\udcf8", "gradient": "linear-gradient(135deg,#F58529 0%,#DD2A7B 50%,#8134AF 100%)", "color": "#DD2A7B", "desc": "ClickBank weight loss offers via Instagram Reels, Stories & Feed \u2014 visual-first platform", "weeks": [{"id": 0, "label": "Week 1", "title": "Instagram Strategy & Creative Planning", "goal": "Understand Instagram's formats, algorithm, and plan your content strategy.", "color": "#DD2A7B", "tabs": ["Course", "Offer Scorecard", "Notes"], "secs": [{"label": "Days 1\u20133 \u00b7 Platform & Account Setup", "items": [{"day": "Day 1", "text": "Instagram ads run through <strong>Meta Ads Manager</strong> \u2014 the same account as Facebook. Connect your Instagram Business account in Business Manager \u2192 Instagram Accounts.", "time": "~20 min", "id": "ig:w0s0t0"}, {"day": "Day 2", "text": "Study Instagram's <strong>4 ad formats for 2025</strong>: Reels (9:16 video, highest reach), Stories (9:16, high swipe-through), Feed (1:1 or 4:5), Explore. Prioritize Reels first.", "time": "~1 hr", "id": "ig:w0s0t1"}, {"day": "Day 3", "text": "Research competitors in <strong>Facebook Ad Library</strong> filtered to Instagram placement. Study what hooks stop the scroll in the first 2 seconds. Screenshot 10\u201315 compelling ads.", "time": "~3 hrs", "id": "ig:w0s0t2"}]}, {"label": "Days 4\u20137 \u00b7 Offer & Creative Strategy", "items": [{"day": "Day 4", "text": "Choose your ClickBank offer with Instagram in mind: can you tell a visually compelling story without before/after imagery? Lifestyle transformation (not body transformation) is the key angle.", "time": "~2 hrs", "id": "ig:w0s1t0"}, {"day": "Day 5", "text": "Plan <strong>3 creative concepts</strong> for Reels: (1) talking-head facing camera, (2) text-overlay montage with lifestyle footage, (3) POV-style morning routine. Each needs a hook in the first 1\u20133 seconds.", "time": "~2 hrs", "id": "ig:w0s1t1"}], "warn": "Same Meta/Facebook policies apply on Instagram: no before/after body images, no specific weight claims, no medical language. Additionally, Instagram users are more visually sophisticated \u2014 overly produced or hypey creative underperforms."}]}, {"id": 1, "label": "Week 2", "title": "Creative Production", "goal": "Film and edit your Reels, Stories, and Feed ads ready to launch.", "color": "#8134AF", "tabs": ["Course", "Ad Policy Checker", "Notes"], "secs": [{"label": "Days 8\u201311 \u00b7 Film & Edit", "items": [{"day": "Day 8", "text": "Create your <strong>Reels ad video</strong> (30\u201345 sec, 9:16). Structure: Hook (0\u20133s) \u2192 Problem acknowledgment (3\u201310s) \u2192 Curiosity/discovery (10\u201325s) \u2192 CTA to 'link in bio.' Use CapCut (free) for editing. Add auto-generated subtitles \u2014 80% of Reels are watched without sound.", "time": "~3\u20134 hrs", "id": "ig:w1s0t0"}, {"day": "Day 10", "text": "Create your <strong>Stories ad</strong> (9:16, 15 sec max). Cut your Reels video to 15 seconds: keep only the hook and CTA. Add text overlay: 'Watch the full video \u2192'", "time": "~1 hr", "id": "ig:w1s0t1"}, {"day": "Day 11", "text": "Create your <strong>Feed ad</strong> (1080\u00d71350 portrait in Canva). Instagram Feed requires more visual polish than Facebook. Use a compelling lifestyle composition. Write a 2\u20133 paragraph caption with pain \u2192 curiosity \u2192 CTA. End with 'Click Learn More below.'", "time": "~2 hrs", "id": "ig:w1s0t2"}, {"day": "Day 12", "text": "Review all creatives for policy compliance: no before/after imagery, no specific claims. Add captions/subtitles to all video content. Export videos at 1080\u00d71920, H.264 MP4, 30fps.", "time": "~1 hr", "id": "ig:w1s0t3"}], "succ": "3 creative formats ready: Reels video (30\u201345 sec), Stories cut (15 sec), Feed image. All captioned and exported at correct specs."}]}, {"id": 2, "label": "Week 3", "title": "Launch & Instagram Metrics", "goal": "Launch separate campaigns per format, read Instagram-specific metrics, and optimize.", "color": "#F59E0B", "tabs": ["Course", "Ad Tracker", "Diagnosis Wizard", "Notes"], "secs": [{"label": "Days 15\u201318 \u00b7 Launch & Measure", "items": [{"day": "Day 15", "text": "Create 3 separate campaigns in Meta Ads Manager \u2014 one for each format. Use <strong>Manual Placements</strong> and select only that format's placement for each. Women 35\u201355, US, $10/day per campaign.", "time": "~1 hr", "id": "ig:w2s0t0"}, {"day": "Day 16", "text": "Add your Reels video, Stories cut, and Feed image to their respective campaigns. Use your bridge page URL as the destination.", "time": "~30 min", "id": "ig:w2s0t1"}, {"day": "Day 17", "text": "Track Instagram-specific metrics: <strong>3-Second Video View Rate target: 25%+</strong> (strong hook), <strong>ThruPlay rate target: 8%+</strong> (strong content), <strong>CTR target: 1%+</strong>. Low 3-sec rate = reshoot your hook.", "time": "~30 min", "id": "ig:w2s0t2"}, {"day": "Day 18", "text": "After 7 days: identify the best-performing format by CTR and hops. Pause the worst-performing format campaign. Reallocate its budget to the winner.", "time": "~30 min", "id": "ig:w2s0t3"}]}, {"label": "Days 19\u201321 \u00b7 Optimize & Test", "items": [{"day": "Day 19", "text": "Create 2 new creative variations for your best-performing format: different hook style (if talking-head, try text-overlay; if text-overlay, try talking-head).", "time": "~2 hrs", "id": "ig:w3s0t0"}, {"day": "Day 20", "text": "Set up <strong>Video Viewer Retargeting</strong>: Audiences \u2192 Create \u2192 Custom \u2192 Video. Target 75% viewers of your Reels video. Create a direct-response retargeting campaign at $5/day.", "time": "~1 hr", "id": "ig:w3s0t1"}, {"day": "Day 21", "text": "Full Instagram month review: Best format | Best hook | ThruPlay % | Cost per hop | Net P&L. Write Instagram Month 2 plan.", "time": "~1 hr", "id": "ig:w3s0t2"}]}]}, {"id": 3, "label": "Week 4", "title": "Scale & Advanced Audiences", "goal": "Scale winning formats, build lookalikes, and plan Month 2 creative strategy.", "color": "#F59E0B", "tabs": ["Course", "Ad Tracker", "Notes"], "secs": [{"label": "Days 22\u201330 \u00b7 Scale & Expand", "items": [{"day": "Day 22", "text": "Scale your best creative: duplicate its Ad Set at 20% higher budget. Do not edit the original.", "time": "~10 min", "id": "ig:w3s0t0"}, {"day": "Day 24", "text": "Create a <strong>Lookalike Audience</strong> from your Reels 25%+ video viewers. Use it in a new Ad Set at $10/day. This is Instagram's most powerful scaling lever.", "time": "~1 hr", "id": "ig:w3s0t1"}, {"day": "Day 27", "text": "Plan Month 2 creative direction: if you've used text-overlay, now test talking-head. Creator-style (authentic, phone-shot) consistently outperforms polished studio content on Instagram for health niches.", "time": "~1 hr", "id": "ig:w3s0t2"}]}]}]}, {"id": "ga", "label": "Google Ads", "icon": "\ud83d\udd0d", "gradient": "linear-gradient(135deg,#4285F4 0%,#34A853 100%)", "color": "#4285F4", "desc": "ClickBank weight loss offers via Google Search \u2014 highest purchase intent traffic", "weeks": [{"id": 0, "label": "Week 1", "title": "Account Setup & Policy Compliance", "goal": "Set up Google Ads correctly and verify your offer complies with Google's strict health policies.", "color": "#4285F4", "tabs": ["Course", "Offer Scorecard", "Notes"], "secs": [{"label": "Days 1\u20133 \u00b7 Setup & Policy", "items": [{"day": "Day 1", "text": "Go to <strong>ads.google.com</strong>. Click 'Switch to Expert Mode' immediately \u2014 do not use the Smart Campaign wizard. Complete account setup with billing information.", "time": "~30 min", "id": "ga:w0s0t0"}, {"day": "Day 2", "text": "Read Google's <strong>Healthcare and Medicines policy</strong>. This is Google's strictest ad category. Understand what is and isn't allowed before spending anything.", "time": "~2 hrs", "id": "ga:w0s0t1"}, {"day": "Day 3", "text": "Evaluate your ClickBank offer against Google's policies \u2014 stricter than Facebook or Microsoft. The offer's sales page will be reviewed. Find a compliant offer with a professional, claim-free sales page.", "time": "~2 hrs", "id": "ga:w0s0t2"}], "warn": "Google Ads is the most policy-strict platform for weight loss. Many ClickBank supplement offers cannot run on Google. Test your offer's sales page carefully. One policy violation can suspend your entire account."}, {"label": "Days 4\u20137 \u00b7 Research & Tracking", "items": [{"day": "Day 4", "text": "Use <strong>Google Keyword Planner</strong> (Tools \u2192 Planning \u2192 Keyword Planner). Research weight loss keywords. Target: medium competition, under $3.00 suggested CPC.", "time": "~2 hrs", "id": "ga:w0s1t0"}, {"day": "Day 5", "text": "Set up <strong>Google Tag Manager</strong> on your bridge page (tagmanager.google.com). Install both GTM code snippets in Systeme.io's custom header code.", "time": "~1 hr", "id": "ga:w0s1t1"}, {"day": "Day 6", "text": "Create a <strong>Conversion Action</strong> in Google Ads for bridge page CTA clicks. Use Google Tag Manager to deploy the conversion tag. Verify with GTM Preview mode.", "time": "~1 hr", "id": "ga:w0s1t2"}, {"day": "Day 7", "text": "Review bridge page with Google's landing page requirements: &lt;3 sec load, privacy policy visible, no misleading claims, no pop-ups blocking content. Test with Google's PageSpeed Insights (pagespeed.web.dev).", "time": "~1 hr", "id": "ga:w0s1t2"}]}]}, {"id": 1, "label": "Week 2", "title": "Search Campaign Creation", "goal": "Build a well-structured Search campaign with RSAs, targeted ad groups, and extensive negatives.", "color": "#22C55E", "tabs": ["Course", "Ad Policy Checker", "Notes"], "secs": [{"label": "Days 8\u201312 \u00b7 Campaign Build", "items": [{"day": "Day 8", "text": "Create a <strong>Search campaign</strong> in Expert Mode: GA-WL-Search-01. Budget $15\u201320/day. Manual CPC with Enhanced CPC. <strong>Uncheck</strong> Search Partners and Display Network. US only.", "time": "~30 min", "id": "ga:w1s0t0"}, {"day": "Day 9", "text": "Build 2\u20133 <strong>tightly themed Ad Groups</strong>: Problem-Aware (why can't i lose weight), Solution-Seeking (weight loss program women), Discovery (how to lose weight over 40). 5\u20138 keywords per group, Exact and Phrase match.", "time": "~2 hrs", "id": "ga:w1s0t1"}, {"day": "Day 10", "text": "Write <strong>Responsive Search Ads</strong>: 15 unique headlines (30 chars each), 4 descriptions (90 chars each). Include keywords in at least 3 headlines. No specific claims. Curiosity-based copy only.", "time": "~2 hrs", "id": "ga:w1s0t2"}, {"day": "Day 11", "text": "Add a comprehensive <strong>negative keyword list</strong> (50+ terms): free, recipe, exercise, gym, surgery, ozempic, wegovy, diabetes, teenager, Reddit, YouTube, Amazon, Walmart, and all diet-related recipe terms.", "time": "~1 hr", "id": "ga:w1s0t3"}, {"day": "Day 12", "text": "Publish. After 48 hours, check <strong>Quality Scores</strong> on each keyword (click the speech bubble icon). Target: 7+. Below 5 = rew : "ga:w2s0t1"}, {"day": "Day 21", "text": "Full P&L review for Google Ads: ROAS = Total Revenue \u00f7 Total Spend. Target ROAS above 1.0 for breakeven. Write findings in the Ad Tracker and Notes.", "time": "~30 min", "id": "ga:w3s0t2"}]}]}, {"id": 3, "label": "Week 4", "title": "Scale & Performance Max", "goal": "Scale profitable campaigns and explore Google's AI-driven Performance Max campaigns.", "color": "#A855F7", "tabs": ["Course", "Ad Tracker", "Notes"], "secs": [{"label": "Days 22\u201330 \u00b7 Scale & Advanced", "items": [{"day": "Day 22", "text": "Scale profitable campaigns: duplicate best Ad Group at 20% higher budget. Pause keywords with &gt;50 clicks and no conversions.", "time": "~30 min", "id": "ga:w3s0t0"}, {"day": "Day 24", "text": "Test a <strong>Performance Max campaign</strong> at $10/day if you have 20+ conversions. Provide rich assets: 15 headlines, 4 descriptions, your Reels video (repurposed), lifestyle images. PMax runs across all Google channels automatically.", "time": "~2 hrs", "id": "ga:w3s0t1"}, {"day": "Day 27", "text": "Connect <strong>Google Analytics 4</strong> to your Google Ads account (GA4 \u2192 Admin \u2192 Google Ads Links). Import GA4 conversions into Google Ads for richer optimization signals.", "time": "~1 hr", "id": "ga:w3s0t2"}, {"day": "Day 30", "text": "Google Ads month review: average Quality Score, ROAS, best keyword, top-converting ad group, wasted spend on negated terms. Write Month 2 plan: 3 specific goals with metrics and deadlines.", "time": "~1 hr", "id": "ga:w3s0t2"}]}]}]}]</script>

<script>
const SD=JSON.parse(document.getElementById('SD').textContent);
const COURSES=JSON.parse(document.getElementById('COURSES').textContent);
const PRULES=JSON.parse(document.getElementById('PRULES').textContent);


let isDark=localStorage.getItem('cbTheme')!=='light';
document.documentElement.setAttribute('data-theme',isDark?'dark':'light');

let S=JSON.parse(localStorage.getItem('cbv3')||'null')||{
  done:{},notes:{},spent:0,budget:500,
  view:'home',course:'fb',week:0,tab:{},
  tracker:[],streak:0,bestStreak:0,lastCI:null,
  milestones:{},diagPath:{},expanded:{},
  profile:{name:'',created:null}
};
if(!S.expanded)S.expanded={};
if(!S.diagPath)S.diagPath={};
if(!S.profile)S.profile={name:'',created:null};
if(!S.abtests)S.abtests=[];
if(!S.vault)S.vault=[];
if(!S.reviews)S.reviews=[];
if(!S.emailSeqs)S.emailSeqs=[];
function save(){localStorage.setItem('cbv3',JSON.stringify(S))}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function tid(cid,w,s,t){return cid+':w'+w+'s'+s+'t'+t}
function getWeeks(cid){return COURSES.find(c=>c.id===cid)?.weeks||[]}

function countTasks(cid,wid){
  const weeks=getWeeks(cid);const w=weeks[wid];if(!w)return{tot:0,dn:0};
  let tot=0,dn=0;
  w.secs.forEach((sec,si)=>(sec.items||[]).forEach((item,ti)=>{
    tot++;const id=item.id||tid(cid,wid,si,ti);
    if(S.done[id])dn++;
  }));
  return{tot,dn};
}

function coursePct(cid){
  let tot=0,dn=0;
  getWeeks(cid).forEach((w,i)=>{const c=countTasks(cid,i);tot+=c.tot;dn+=c.dn});
  return tot?Math.round(dn/tot*100):0;
}

function totalPct(){
  let tot=0,dn=0;
  COURSES.forEach(c=>{c.weeks.forEach((w,i)=>{const cc=countTasks(c.id,i);tot+=cc.tot;dn+=cc.dn})});
  return tot?Math.round(dn/tot*100):0;
}

function wkCmp(cid,wid){const{tot,dn}=countTasks(cid,wid);return tot>0&&dn/tot>=0.8}
function isLocked(cid,wid){if(wid===0)return false;return!wkCmp(cid,wid-1)}
function totalTasksDone(){let d=0;COURSES.forEach(c=>c.weeks.forEach((w,i)=>{d+=countTasks(c.id,i).dn}));return d}
function totalTasksAll(){let t=0;COURSES.forEach(c=>c.weeks.forEach((w,i)=>{t+=countTasks(c.id,i).tot}));return t}

// ── SIDEBAR HELPERS ───────────────────────────────────────────────────────────
function getNextTask(){
  for(const c of COURSES){
    for(let wi=0;wi<c.weeks.length;wi++){
      const w=c.weeks[wi];
      for(let si=0;si<w.secs.length;si++){
        const sec=w.secs[si];
        for(let ti=0;ti<(sec.items||[]).length;ti++){
          const item=sec.items[ti];
          const id=item.id||tid(c.id,wi,si,ti);
          if(!S.done[id])return{item,id,c,w,wi};
        }
      }
    }
  }
  return null;
}

function getNextMilestone(){
  const earned=new Set(Object.keys(S.milestones));
  // Define what each milestone needs
  const hints={
    setup_fb:'Mark your Facebook setup as complete',
    setup_ms:'Mark your Microsoft Ads setup as complete',
    setup_ig:'Mark your Instagram connection as complete',
    setup_ga:'Mark your Google Ads setup as complete',
    first_campaign:'Mark your first campaign as launched',
    clicks100:`Log ${100-S.tracker.reduce((a,r)=>a+(+r.clicks||0),0)} more clicks in the Ad Tracker`,
    first_hop:'Log a hop in the Ad Tracker',
    first_sale:'Mark your first ClickBank sale as earned',
    wk1:'Complete 80% of any course Week 1',
    wk4:'Complete all 4 weeks of any single course',
    streak7:`Check in ${7-(S.streak||0)} more consecutive days`,
    profit:'Mark your first profitable day',
    multi_platform:'Mark campaigns live on 2+ platforms',
    '4courses':'Start Week 1 on all 4 courses',
  };
  for(const m of MS){
    if(!earned.has(m.id))return{m,hint:hints[m.id]||'Keep making progress'};
  }
  return null;
}

function getBurnRate(){
  const rows=S.tracker.filter(r=>+r.spend>0);
  if(!rows.length)return null;
  const totalDays=rows.length;
  const totalSpend=rows.reduce((a,r)=>a+(+r.spend||0),0);
  const daily=totalSpend/totalDays;
  const rem=Math.max(0,S.budget-S.spent);
  const daysLeft=daily>0?Math.round(rem/daily):null;
  return{daily:daily.toFixed(0),daysLeft};
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar(){
  // Update header always
  const p=totalPct();
  document.getElementById('opct').textContent=p+'%';
  document.getElementById('obar').style.width=p+'%';

  const body=document.getElementById('sidebar-body');
  if(!body)return;

  if(S.view==='home'){
    body.innerHTML=renderHomeSidebar();
    // bind spend input after render
    const inp=document.getElementById('spinp-home');
    if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')addSpend();});
  } else {
    body.innerHTML=renderCourseSidebar();
    const inp=document.getElementById('spinp-course');
    if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')addSpend();});
  }
}

function renderHomeSidebar(){
  // ── TODAY'S FOCUS ──
  const next=getNextTask();
  const focusHtml=next
    ?`<div class="focus-card" onclick="goCourse('${next.c.id}',${next.wi})">
        <div class="focus-day">${next.c.icon} ${next.c.label} · ${next.w.label}</div>
        <div class="focus-text">${next.item.text.replace(/<[^>]+>/g,'')}</div>
        <div class="focus-meta"><span>${next.item.day||''}</span><span class="focus-arrow">Open →</span></div>
      </div>`
    :`<div class="focus-empty">🎉 All tasks complete!</div>`;

  // ── PLATFORM STATUS ──
  const platformHtml=COURSES.map(c=>{
    const pct=coursePct(c.id);
    let curWeek=0;
    for(let i=0;i<c.weeks.length;i++){if(wkCmp(c.id,i))curWeek=i+1;}
    curWeek=Math.min(curWeek,c.weeks.length-1);
    const wLabel=c.weeks[curWeek]?'Week '+(curWeek+1):'Week 1';
    return`<div class="platform-row" onclick="goCourse('${c.id}',${curWeek})">
      <span class="prow-icon">${c.icon}</span>
      <div class="prow-info">
        <div class="prow-name">${c.label}</div>
        <div class="prow-week">${wLabel} · ${pct}%</div>
        <div class="prow-bar"><div class="prow-fill" style="width:${pct}%;background:${c.color}"></div></div>
      </div>
      <div class="prow-pct">${pct}%</div>
    </div>`;
  }).join('');

  // ── STREAK ──
  const today=new Date().toDateString();
  const lastCI=S.lastCI?new Date(S.lastCI).toDateString():null;
  const canCI=lastCI!==today;
  const streakHtml=`<div class="streak-row">
    <div class="streak-flame">🔥</div>
    <div class="streak-info">
      <div class="streak-num">${S.streak||0}</div>
      <div class="streak-lbl">day streak · best ${S.bestStreak||0}</div>
    </div>
    <button class="checkin-sb" onclick="doCI()" ${canCI?'':'disabled'}>${canCI?'Check in ✓':'Done ✓'}</button>
  </div>`;

  // ── BUDGET + BURN RATE ──
  const rem=Math.max(0,S.budget-S.spent);
  const spPct=Math.min(100,(S.spent/S.budget)*100);
  const barColor=spPct>80?'#f87171':spPct>50?'#fbbf24':'#4ade80';
  const burn=getBurnRate();
  const burnHint=burn
    ?`At $${burn.daily}/day → ${burn.daysLeft!=null?burn.daysLeft+' days left':'∞'}`
    :'Log spend daily to see burn rate';
  const budgetHtml=`
    <div class="budget-row-sb"><span class="budget-key-sb">Budget</span><span class="budget-val-sb">$${S.budget}</span></div>
    <div class="budget-row-sb"><span class="budget-key-sb">Spent</span><span class="budget-val-sb r">$${S.spent.toFixed(0)}</span></div>
    <div class="budget-row-sb"><span class="budget-key-sb">Remaining</span><span class="budget-val-sb ${rem<100?'r':rem<250?'a':'g'}">$${rem.toFixed(0)}</span></div>
    <div class="burn-hint">${burnHint}</div>
    <div class="budget-bar-sb"><div class="budget-bar-fill-sb" style="width:${spPct}%;background:${barColor}"></div></div>
    <div class="spend-row">
      <input type="number" id="spinp-home" placeholder="Log spend ($)" min="0" step="1">
      <button onclick="addSpend()">Log</button>
    </div>`;

  // ── NEXT MILESTONE ──
  const nm=getNextMilestone();
  const msHtml=nm
    ?`<div class="ms-next">
        <div class="ms-next-icon">${nm.m.icon}</div>
        <div>
          <div class="ms-next-title">${nm.m.t}</div>
          <div class="ms-next-hint">${nm.hint}</div>
        </div>
      </div>`
    :`<div class="ms-all-done">🏆 All milestones earned!</div>`;

  return`
    <div class="sb-section" style="overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent">
      <div class="sb-sec-label">Today's Focus</div>
      ${focusHtml}

      <div class="sb-sec-label" style="margin-top:16px">Platform Status</div>
      ${platformHtml}

      <div class="sb-sec-label" style="margin-top:16px">Streak</div>
      ${streakHtml}
    </div>
    <div class="sb-section" style="flex-shrink:0">
      <div class="sb-sec-label">Budget</div>
      ${budgetHtml}
    </div>
    <div class="sb-section" style="flex-shrink:0">
      <div class="sb-sec-label">Next Milestone</div>
      ${msHtml}
    </div>`;
}

function renderCourseSidebar(){
  let nav=`<nav class="snav" style="flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent">
    <button class="nb" onclick="goHome()"><span class="ni">🏠</span><span class="nt"><div class="nl">Dashboard</div><div class="ntt">Home &amp; Overview</div></span></button>`;
  COURSES.forEach(c=>{
    const isOpen=S.view==='course'&&S.course===c.id;
    nav+=`<div class="nav-section">${c.label}</div>`;
    c.weeks.forEach((w,wi)=>{
      const{tot,dn}=countTasks(c.id,wi);const wpct=tot?Math.round(dn/tot*100):0;
      const lk=isLocked(c.id,wi);const active=isOpen&&S.week===wi;
      nav+=`<button class="nb ${active?'active':''} ${lk?'locked':''}" onclick="${lk?`showToast('Complete 80% of ${w.label} first.','🔒')`:`goCourse('${c.id}',${wi})`}">
        <span class="ni">${c.icon}</span>
        <span class="nt">
          <div class="nl">${w.label}${lk?' · locked':''}</div>
          <div class="ntt">${w.title}</div>

function updateScore(){
  const grav=parseFloat(document.getElementById('sc-grav')?.value)||0;
  const pay=parseFloat(document.getElementById('sc-pay')?.value)||0;
  const mob=parseInt(document.getElementById('sc-mob')?.value)||3;
  const pg=parseInt(document.getElementById('sc-pg')?.value)||3;
  const cl=parseInt(document.getElementById('sc-cl')?.value)||0;
  const name=document.getElementById('sc-name')?.value||'This offer';
  const checks=[
    {l:"Gravity",v:grav,p:grav>=30&&grav<=80,w:grav>80,d:grav<30?'Too low — unproven':grav>80?'High — possibly saturated':'Sweet spot ✓'},
    {l:"Avg $/Conv",v:'$'+pay,p:pay>=35,w:pay>=25&&pay<35,d:pay<25?'Too low for paid ads':pay<35?'Tight margins':'Good payout ✓'},
    {l:"Mobile Page",v:mob+'/5',p:mob>=4,w:mob===3,d:mob<3?'Poor — avoid':mob===3?'Average':'Strong ✓'},
    {l:"Page Quality",v:pg+'/5',p:pg>=4,w:pg===3,d:pg<3?'Weak — hurts conv':pg===3?'Test carefully':'Strong ✓'},
    {l:"Compliant",v:cl?'✓':'✗',p:cl===1,w:false,d:cl?'No issues found ✓':'Has policy violations'},
  ];
  const passed=checks.filter(c=>c.p).length;const score=Math.round(passed/checks.length*100);
  const verd=passed>=4?{l:'PASS',c:'var(--green)',e:'✅',m:"This offer meets all criteria. It's a viable candidate to test."}
    :passed>=3?{l:'MARGINAL',c:'var(--amber)',e:'⚠️',m:'Proceed with caution. Fix failing criteria or find a stronger offer.'}
    :{l:'FAIL',c:'var(--red)',e:'❌',m:"This offer doesn't meet the criteria. Keep searching on ClickBank."};
  const r=document.getElementById('scr');if(!r)return;
  r.innerHTML=`<div style="display:flex;align-items:center;gap:11px;margin-bottom:9px"><div class="svd" style="color:${verd.c}">${verd.e} ${name} — ${verd.l}</div></div>
  <div style="font-size:13px;color:var(--text2);margin-bottom:11px">${verd.m}</div>
  <div class="sbt2"><div class="sbf" style="width:${score}%;background:${verd.c}"></div></div>
  <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin:4px 0 11px">${score}% · ${passed}/5 criteria passed</div>
  <div class="sbd">${checks.map(c=>`<div class="scel"><div class="scelv ${c.p?'spass':c.w?'swarn':'sfail'}">${c.v}</div><div class="scell">${c.l}</div><div class="sceld">${c.d}</div></div>`).join('')}</div>`;
}

function runPC(cid){

function trackerChart(){
  const rows=S.tracker.filter(r=>(+r.spend||0)>0||(+r.rev||0)>0);
  if(rows.length<2)return'<div class="chart-empty">📈 Log at least 2 days of spend or revenue to see your trend chart here.</div>';
  const W=680,H=200,P={t:14,r:78,b:22,l:44};
  const iw=W-P.l-P.r,ih=H-P.t-P.b;
  const max=Math.max(...rows.map(r=>Math.max(+r.spend||0,+r.rev||0)),1);
  const step=Math.pow(10,Math.floor(Math.log10(max)));
  const ymax=Math.ceil(max/step)*step;
  const x=i=>P.l+i*iw/(rows.length-1);
  const y=v=>P.t+ih-(v/ymax)*ih;
  const pts=k=>rows.map((r,i)=>x(i).toFixed(1)+','+y(+r[k]||0).toFixed(1)).join(' ');
  let grid='';
  [0,ymax/2,ymax].forEach(v=>{
    grid+='<line x1="'+P.l+'" y1="'+y(v)+'" x2="'+(W-P.r)+'" y2="'+y(v)+'" stroke="var(--border)" stroke-width="1"/>'+
      '<text x="'+(P.l-6)+'" y="'+(y(v)+3)+'" text-anchor="end" font-size="9" fill="var(--text3)">$'+v+'</text>';
  });
  const xlab=(i,a)=>'<text x="'+x(i)+'" y="'+(H-6)+'" text-anchor="'+a+'" font-size="9" fill="var(--text3)">'+escHtml(rows[i].date||('Day '+(i+1)))+'</text>';
  const xlabels=xlab(0,'start')+xlab(rows.length-1,'end');
  let dots='';
  rows.forEach((r,i)=>{
    const sp=+r.spend||0,rv=+r.rev||0;
    const tt=(r.date||('Day '+(i+1)))+' — Spend $'+sp.toFixed(0)+' · Revenue $'+rv.toFixed(0);
    dots+='<g><title>'+escHtml(tt)+'</title>'+
      '<rect x="'+(x(i)-iw/(rows.length-1)/2)+'" y="'+P.t+'" width="'+(iw/(rows.length-1))+'" height="'+ih+'" fill="transparent"/>'+
      '<circle cx="'+x(i)+'" cy="'+y(sp)+'" r="3.5" fill="var(--blue)" stroke="var(--card)" stroke-width="2"/>'+
      '<circle cx="'+x(i)+'" cy="'+y(rv)+'" r="3.5" fill="var(--green)" stroke="var(--card)" stroke-width="2"/></g>';
  });
  const last=rows.length-1;
  let ySp=y(+rows[last].spend||0),yRv=y(+rows[last].rev||0);
  if(Math.abs(ySp-yRv)<12){const mid=(ySp+yRv)/2;if(ySp<=yRv){ySp=mid-6;yRv=mid+6;}else{ySp=mid+6;yRv=mid-6;}}
  const endLbl=(yy,color,name)=>'<text x="'+(W-P.r+8)+'" y="'+(yy+3)+'" font-size="10" fill="var(--text2)"><tspan fill="'+color+'">●</tspan> '+name+'</text>';
  return'<div class="chart-card">'+
    '<div class="chart-legend"><span><span class="lg-dot" style="background:var(--blue)"></span>Spend</span><span><span class="lg-dot" style="background:var(--green)"></span>Revenue</span></div>'+
    '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" role="img" aria-label="Daily spend versus revenue line chart">'+
    grid+xlabels+
    '<polyline points="'+pts('spend')+'" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    '<polyline points="'+pts('rev')+'" fill="none" stroke="var(--green)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    endLbl(ySp,'var(--blue)','Spend')+endLbl(yRv,'var(--green)','Revenue')+
    dots+'</svg></div>';
}

function renderDiag(cid){
  const tree=DIAG[cid]||DIAG.fb;
  if(!S.diagPath[cid])S.diagPath[cid]=[];
  const path=S.diagPath[cid];
  let node=tree;
  for(const ch of path){if(node.opts&&node.opts[ch]?.nx)node=node.opts[ch].nx;else if(node.opts&&node.opts[ch]?.r){node={r:node.opts[ch].r};break;}}
  if(node.r)return`<div class="sg"><div class="se">Diagnosis Wizard${ib('diag')}</div><div class="dr"><div class="drt">🔍 ${node.r.t}</div><div class="drb">${node.r.b}</div><div class="da"><strong>What to do next:</strong> ${node.r.a}</div></div><button class="drst" onclick="resetDiag('${cid}')">← Start over</button></div>`;
  return`<div class="sg"><div class="se">Diagnosis Wizard${ib('diag')}</div>
  <div class="ib">Answer honestly to pinpoint exactly where your funnel is breaking.</div>
  <div class="ds"><div class="dq">${node.q}</div><div class="do2">${(node.opts||[]).map((o,i)=>`<button class="dopt" onclick="diagChoose('${cid}',${i})">${o.l}</button>`).join('')}</div></div>
  ${path.length?`<button class="drst" onclick="S.diagPath['${cid}']=S.diagPath['${cid}'].slice(0,-1);save();renderTab()">← Back</button>`:''}
  </div>`;
}
